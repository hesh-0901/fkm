<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Fournisseurs | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>

<body>
<div class="app">
  <div id="sidebar-container"></div>

  <main class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <button class="btn btn-outline-secondary btn-sm" id="toggleSidebar">
        <i class="bi bi-list"></i>
      </button>

      <h1 class="page-title">Fournisseurs</h1>

      <div class="d-flex align-items-center gap-3">
        <div class="text-end">
          <div class="user-name" id="userName">—</div>
          <div class="user-role" id="userRole">—</div>
        </div>
        <button class="btn btn-outline-danger btn-sm" id="logoutBtn">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- ACTION BAR -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <strong>Liste des fournisseurs</strong>
      <button class="btn btn-success btn-sm d-none" id="addSupplierBtn">
        <i class="bi bi-plus-lg"></i> Nouveau fournisseur
      </button>
    </div>

    <!-- TABLE -->
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>Nom</th>
            <th>Téléphone</th>
            <th>Statut</th>
            <th>Créé par</th>
            <th>Créé le</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody id="suppliersTable"></tbody>
      </table>
    </div>

  </main>
</div>

<!-- MODAL FOURNISSEUR -->
<form id="supplierForm">
  <div class="mb-3">
    <label class="form-label">Nom</label>
    <input id="sName" class="form-control" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Téléphone</label>
    <input id="sPhone" class="form-control">
  </div>

  <div class="mb-3">
    <label class="form-label">Commentaire</label>
    <textarea id="sComment" class="form-control" rows="3"
      placeholder="Contact, condition, remarque..."></textarea>
  </div>
</form>


      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button class="btn btn-success" id="saveSupplierBtn">Enregistrer</button>
      </div>

    </div>
  </div>
</div>

<script type="module" src="../js/fournisseurs.js"></script>
<script src="../js/sidebar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
