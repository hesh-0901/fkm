<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Taux & Devises | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#0B5C6B",
            primaryDark: "#083F4A",
            success: "#2E7D32",
            warning: "#D4A017",
            danger: "#DC2626",
            bg: "#F5F7FA",
            muted: "#6B7280"
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:Inter,system-ui}</style>
  <link rel="icon" href="data:,">
</head>

<body class="bg-bg text-slate-800">

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <main id="mainContent" class="flex-1 px-6 py-6 space-y-6 overflow-x-hidden">

    <!-- HEADER -->
    <div class="bg-white rounded-xl shadow-sm px-6 py-4 flex items-center justify-between">

      <div class="flex items-center gap-3">
        <button id="toggleSidebar"
                class="p-2 rounded-lg border border-slate-200 hover:bg-slate-100 transition">
          <i class="bi bi-list"></i>
        </button>

        <div>
          <h1 class="text-lg font-semibold leading-tight">Taux & Devises</h1>
          <p class="text-xs text-muted">Gestion des taux de change</p>
        </div>
      </div>

      <div class="flex items-center gap-6">
        <div class="text-right">
          <div id="userName" class="font-semibold leading-tight">—</div>
          <div id="userRole" class="text-sm text-muted">—</div>
        </div>

        <button id="logoutBtn"
                class="px-4 py-2 rounded-lg border border-red-200 text-danger hover:bg-red-50 transition">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- ACTION BAR -->
    <div class="flex items-center justify-between">
      <div>
        <h2 class="text-lg font-semibold">Historique des taux</h2>
        <p class="text-xs text-muted">Suivi complet des modifications</p>
      </div>

      <button id="openRateModalBtn"
              class="flex items-center gap-2 px-5 py-2.5 rounded-xl
                     bg-gradient-to-r from-primary to-primaryDark
                     text-white shadow hover:scale-105 transition">
        <i class="bi bi-plus-lg"></i>
        Nouveau taux
      </button>
    </div>

    <!-- TABLE -->
    <div class="bg-white rounded-2xl shadow-md border border-slate-100 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full text-sm">

          <thead class="bg-slate-50 border-b text-xs uppercase tracking-wide text-slate-500">
            <tr>
              <th class="px-6 py-4">#</th>
              <th class="px-6 py-4">Taux USD → CDF</th>
              <th class="px-6 py-4">Modifié par</th>
              <th class="px-6 py-4">Rôle</th>
              <th class="px-6 py-4">Date</th>
            </tr>
          </thead>

          <tbody id="ratesTable" class="divide-y divide-slate-100">
          </tbody>

        </table>
      </div>
    </div>

  </main>
</div>

<!-- MODAL -->
<div class="modal fade" id="rateModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-xl">

      <div class="modal-header">
        <h5 class="modal-title">
          <i class="bi bi-currency-exchange me-2"></i>
          Nouveau taux USD → CDF
        </h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Taux</label>
          <input id="usdCdfRate"
                 type="number"
                 step="0.01"
                 class="form-control">
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">
          Annuler
        </button>
        <button class="btn btn-success" id="saveRateBtn">
          Enregistrer
        </button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/sidebar.js"></script>
<script type="module" src="../js/taux-devises.js"></script>

</body>
</html>
