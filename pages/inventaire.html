<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Inventaire | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap CSS -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <!-- Dashboard CSS -->
  <link rel="stylesheet" href="../css/dashboard.css">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <main class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <button class="btn btn-outline-secondary btn-sm" id="toggleSidebar">
        <i class="bi bi-list"></i>
      </button>

      <h1 class="page-title">Inventaire</h1>

      <div class="d-flex align-items-center gap-3">
        <div class="text-end">
          <div class="user-name" id="userName">—</div>
          <div class="user-role" id="userRole">—</div>
        </div>
        <button class="btn btn-outline-danger btn-sm" id="logoutBtn">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- INVENTAIRE -->
    <div class="card">
      <div class="card-body">

        <div class="d-flex justify-content-between align-items-center mb-3">
          <strong>Liste des produits</strong>

          <!-- Visible admin / directeur -->
          <button class="btn btn-sm btn-success" id="addProductBtn" style="display:none;">
            <i class="bi bi-plus-lg"></i> Nouveau produit
          </button>
        </div>

        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead class="table-light">
              <tr>
                <th>Produit</th>
                <th>Catégorie</th>
                <th>Quantité</th>
                <th>USD</th>
                <th>CDF</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="inventoryTable">
              <!-- Injecté par JS -->
            </tbody>
          </table>
        </div>

      </div>
    </div>

  </main>
</div>

<!-- MODAL : NOUVEAU PRODUIT -->
<div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Nouveau produit</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="productForm">

          <div class="row g-3">

            <!-- Nom -->
            <div class="col-md-6">
              <label class="form-label">Nom du produit</label>
              <input type="text" class="form-control" id="pName" required>
            </div>

            <!-- Catégorie -->
            <div class="col-md-6">
              <label class="form-label">Catégorie</label>
              <input type="text" class="form-control" id="pCategory" required>
            </div>

            <!-- Quantité -->
            <div class="col-md-4">
              <label class="form-label">Quantité actuelle</label>
              <input type="number" class="form-control" id="pQty" min="0" required>
            </div>

            <!-- Seuil minimum -->
            <div class="col-md-4">
              <label class="form-label">
                Stock minimum (alerte)
              </label>
              <input type="number" class="form-control" id="pMinQty" min="0" value="0">
              <small class="text-muted">
                Alerte si stock ≤ seuil
              </small>
            </div>

            <!-- Devise -->
            <div class="col-md-4">
              <label class="form-label">Devise de prix</label>
              <select class="form-select" id="priceCurrency">
                <option value="USD">USD uniquement</option>
                <option value="CDF">CDF uniquement</option>
                <option value="BOTH">USD & CDF</option>
              </select>
            </div>

            <!-- Prix USD -->
            <div class="col-md-6" id="usdBlock">
              <label class="form-label">Prix unitaire (USD)</label>
              <input type="number" class="form-control" id="pUsd" min="0">
            </div>

            <!-- Prix CDF -->
            <div class="col-md-6 d-none" id="cdfBlock">
              <label class="form-label">Prix unitaire (CDF)</label>
              <input type="number" class="form-control" id="pCdf" min="0">
            </div>

          </div>

        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button class="btn btn-success" id="saveProductBtn">Enregistrer</button>
      </div>

    </div>
  </div>
</div>


<!-- JS -->
<script type="module" src="../js/inventaire.js"></script>
<script src="../js/sidebar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
