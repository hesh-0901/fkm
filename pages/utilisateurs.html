<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Utilisateurs | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#0B5C6B",
            success: "#2E7D32",
            warning: "#D4A017",
            danger: "#DC2626",
            bg: "#F5F7FA",
            muted: "#6B7280"
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:Inter,system-ui}</style>
  <link rel="icon" href="data:,">
</head>

<body class="bg-bg text-slate-800">

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <main id="mainContent" class="flex-1 px-6 py-6 space-y-6 overflow-x-hidden">

    <!-- TOPBAR -->
    <div class="bg-white rounded-xl shadow-sm px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button id="toggleSidebar"
                class="p-2 rounded-lg border border-slate-200 hover:bg-slate-100">
          <i class="bi bi-list"></i>
        </button>
        <div>
          <h1 class="text-lg font-semibold">Utilisateurs</h1>
          <p class="text-xs text-muted">Gestion des accès et rôles</p>
        </div>
      </div>

      <div class="flex items-center gap-6">
        <div class="text-right">
          <div id="userName" class="font-semibold">—</div>
          <div id="userRole" class="text-sm text-muted">—</div>
        </div>
        <button id="logoutBtn"
                class="px-4 py-2 rounded-lg border border-red-200 text-danger hover:bg-red-50">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- ACTION BAR -->
    <div class="flex items-center justify-between">
      <h2 class="font-semibold">Liste des utilisateurs</h2>
      <button id="addUserBtn"
              class="d-none items-center gap-2 px-4 py-2 rounded-lg bg-success text-white">
        <i class="bi bi-person-plus"></i>
        Nouvel utilisateur
      </button>
    </div>

    <!-- TABLE -->
    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
          <thead class="bg-slate-50 border-b">
            <tr class="text-slate-600">
              <th class="px-4 py-3">Nom</th>
              <th class="px-4 py-3">Email</th>
              <th class="px-4 py-3">Rôle</th>
              <th class="px-4 py-3">Statut</th>
              <th class="px-4 py-3">Créé le</th>
              <th class="px-4 py-3 text-end">Actions</th>
            </tr>
          </thead>
          <tbody id="usersTable" class="divide-y"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!-- MODAL INFO USER -->
<div class="modal fade" id="userInfoModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-xl">
      <div class="modal-header">
        <h5 class="modal-title">Informations utilisateur</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="userInfoContent"></div>
    </div>
  </div>
</div>

<!-- MODAL CREATE USER -->
<div class="modal fade" id="userModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-xl">
      <div class="modal-header">
        <h5 class="modal-title">Nouvel utilisateur</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="userForm">
          <div class="mb-3">
            <label class="form-label">Nom</label>
            <input id="uName" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input id="uEmail" type="email" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Rôle</label>
            <select id="uRole" class="form-select">
              <option value="operateur">Opérateur</option>
              <option value="admin">Admin</option>
              <option value="directeur">Directeur</option>
            </select>
          </div>
        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button class="btn btn-success" id="saveUserBtn">Enregistrer</button>
      </div>
    </div>
  </div>
</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/sidebar.js"></script>
<script type="module" src="../js/utilisateurs.js"></script>

</body>
</html>
