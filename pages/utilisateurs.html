<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Utilisateurs | FKM ENERGY</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: "#0B5C6B",
        primaryDark: "#083F4A",
        success: "#10B981",
        warning: "#F59E0B",
        danger: "#EF4444",
        bg: "#F3F6FB",
        muted: "#6B7280"
      }
    }
  }
}
</script>

<link rel="icon" href="data:,">
</head>

<body class="bg-bg text-slate-800">

<div class="flex min-h-screen">

<!-- SIDEBAR IDENTIQUE -->
<div id="sidebar-container"></div>

<!-- MAIN -->
<main id="mainContent" class="flex-1 px-8 py-8 space-y-8 overflow-x-hidden">

<!-- ================= HEADER IDENTIQUE INVENTAIRE ================= -->
<div class="bg-white rounded-2xl shadow-md px-8 py-5 flex items-center justify-between border border-slate-100">

  <div class="flex items-center gap-4">
    <button id="toggleSidebar"
      class="p-2 rounded-lg border border-slate-200 hover:bg-slate-100 transition">
      <i class="bi bi-list text-lg"></i>
    </button>

    <div>
      <h1 class="text-xl font-bold">Utilisateurs</h1>
      <p class="text-sm text-muted">Gestion des accès et rôles</p>
    </div>
  </div>

  <div class="flex items-center gap-6">
    <div class="text-right">
      <div id="userName" class="font-semibold"></div>
      <div id="userRole" class="text-sm text-muted"></div>
    </div>

    <button id="logoutBtn"
      class="px-4 py-2 rounded-lg border border-red-200 text-danger hover:bg-red-50 transition">
      <i class="bi bi-box-arrow-right text-lg"></i>
    </button>
  </div>
</div>

<!-- ================= ACTION BAR ================= -->
<div class="flex items-center justify-between">

  <div>
    <h2 class="text-lg font-semibold">Liste des utilisateurs</h2>
    <p class="text-xs text-muted">Contrôle et activation des comptes</p>
  </div>

  <button id="addUserBtn"
    class="hidden flex items-center gap-2 px-5 py-2.5 rounded-xl 
           bg-gradient-to-r from-success to-emerald-600 
           text-white shadow-md hover:scale-105 transition">
    <i class="bi bi-person-plus text-lg"></i>
    Nouvel utilisateur
  </button>

</div>

<!-- ================= TABLE ================= -->
<div class="bg-white rounded-2xl shadow-md border border-slate-100 overflow-hidden">

<div class="overflow-x-auto">

<table class="min-w-full text-sm">

<thead class="bg-slate-50 border-b text-xs uppercase tracking-wide text-slate-500">
<tr>
<th class="px-6 py-4">Nom</th>
<th class="px-6 py-4">Identifiant</th>
<th class="px-6 py-4">Fonction</th>
<th class="px-6 py-4">Rôle</th>
<th class="px-6 py-4">Statut</th>
<th class="px-6 py-4 text-end">Actions</th>
</tr>
</thead>

<tbody id="usersTable" class="divide-y divide-slate-100">
</tbody>

</table>
</div>
</div>

</main>
</div>

<!-- ================= MODAL ================= -->
<div class="modal fade" id="userModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-xl">

      <div class="modal-header">
        <h5 class="modal-title">Nouvel utilisateur</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="userForm" class="space-y-3">

          <input id="uName" class="form-control" placeholder="Nom complet" required>
          <input id="uUsername" class="form-control" placeholder="prenom.nom" required>
          <input id="uFonction" class="form-control" placeholder="Fonction" required>

          <select id="uRole" class="form-select">
            <option value="operateur">Opérateur</option>
            <option value="admin">Admin</option>
            <option value="directeur">Directeur</option>
          </select>

          <input id="uPassword" type="password" class="form-control" placeholder="Mot de passe" required>
          <input id="uConfirmPassword" type="password" class="form-control" placeholder="Confirmer mot de passe" required>

        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button class="btn btn-success" id="saveUserBtn">Créer</button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/sidebar.js"></script>
<script type="module" src="../js/utilisateurs.js"></script>

</body>
</html>
