<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Utilisateurs | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#0B5C6B",
            success: "#2E7D32",
            danger: "#DC2626",
            bg: "#F5F7FA",
            muted: "#6B7280"
          }
        }
      }
    }
  </script>

  <link rel="icon" href="data:,">
</head>

<body class="bg-bg text-slate-800">

<div class="flex min-h-screen">

  <div id="sidebar-container"></div>

  <main class="flex-1 px-6 py-6 space-y-6">

    <!-- TOPBAR -->
    <div class="bg-white rounded-xl shadow-sm px-6 py-4 flex justify-between items-center">
      <div>
        <h1 class="text-lg font-semibold">Gestion des utilisateurs</h1>
        <p class="text-xs text-muted">Administration des accès</p>
      </div>

      <div class="flex items-center gap-6">
        <div class="text-right">
          <div id="userName" class="font-semibold">—</div>
          <div id="userRole" class="text-sm text-muted">—</div>
        </div>

        <button id="logoutBtn"
          class="px-4 py-2 rounded-lg border border-red-200 text-danger hover:bg-red-50">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- ACTION BAR -->
    <div class="flex justify-between items-center">
      <h2 class="font-semibold text-lg">Liste des utilisateurs</h2>

      <button id="addUserBtn"
        class="hidden flex items-center gap-2 px-5 py-2.5 rounded-xl
               bg-gradient-to-r from-success to-emerald-600
               text-white shadow-md hover:scale-105 transition">
        <i class="bi bi-person-plus"></i>
        Nouvel utilisateur
      </button>
    </div>

    <!-- TABLE -->
    <div class="bg-white rounded-2xl shadow-md border border-slate-100 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
          <thead class="bg-slate-50 border-b text-xs uppercase tracking-wide text-slate-500">
            <tr>
              <th class="px-6 py-4">Nom</th>
              <th class="px-6 py-4">Identifiant</th>
              <th class="px-6 py-4">Fonction</th>
              <th class="px-6 py-4">Rôle</th>
              <th class="px-6 py-4">Statut</th>
              <th class="px-6 py-4">Créé le</th>
              <th class="px-6 py-4 text-end">Actions</th>
            </tr>
          </thead>
          <tbody id="usersTable" class="divide-y divide-slate-100"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!-- MODAL CREATE USER -->
<div class="modal fade" id="userModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-xl">

      <div class="modal-header">
        <h5 class="modal-title">Nouvel utilisateur</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="userForm" class="space-y-4">

          <div>
            <label class="form-label">Nom complet</label>
            <input id="uName" class="form-control" required>
          </div>

          <div>
            <label class="form-label">Identifiant</label>
            <input id="uUsername" class="form-control" placeholder="prenom.nom" required>
            <small class="text-muted">L'email sera généré automatiquement</small>
          </div>

          <div>
            <label class="form-label">Fonction</label>
            <input id="uFonction" class="form-control" required>
          </div>

          <div>
            <label class="form-label">Rôle</label>
            <select id="uRole" class="form-select">
              <option value="operateur">Opérateur</option>
              <option value="admin">Admin</option>
              <option value="directeur">Directeur</option>
            </select>
          </div>

        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button class="btn btn-success" id="saveUserBtn">Créer</button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/sidebar.js"></script>
<script type="module" src="../js/utilisateurs.js"></script>

</body>
</html>
