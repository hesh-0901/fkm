<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Utilisateurs | FKM ENERGY</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<link rel="icon" href="data:,">
</head>

<body class="bg-slate-50 text-slate-800">

<div class="flex min-h-screen">

<div id="sidebar-container"></div>

<main class="flex-1 px-8 py-8 space-y-8">

<!-- HEADER -->
<div class="bg-white rounded-2xl shadow-sm px-6 py-4 flex justify-between items-center border">

  <div>
    <h1 class="text-xl font-bold">Gestion des utilisateurs</h1>
    <p class="text-sm text-slate-500">Administration des accès système</p>
  </div>

  <div class="flex items-center gap-6">
    <div class="text-right">
      <div id="userName" class="font-semibold"></div>
      <div id="userRole" class="text-sm text-slate-500"></div>
    </div>

    <button id="logoutBtn"
      class="px-4 py-2 rounded-lg border border-red-200 text-red-600 hover:bg-red-50 transition">
      <i class="bi bi-box-arrow-right"></i>
    </button>
  </div>
</div>

<!-- ACTION BAR -->
<div class="flex justify-between items-center">
  <h2 class="font-semibold text-lg">Liste des utilisateurs</h2>

  <button id="addUserBtn"
    class="hidden px-5 py-2.5 rounded-xl bg-emerald-600 text-white shadow hover:scale-105 transition">
    <i class="bi bi-person-plus"></i> Nouvel utilisateur
  </button>
</div>

<!-- TABLE -->
<div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
  <div class="overflow-x-auto">
    <table class="min-w-full text-sm">
      <thead class="bg-slate-100 text-slate-600">
        <tr>
          <th class="px-6 py-4 text-left">Nom</th>
          <th class="px-6 py-4 text-left">Identifiant</th>
          <th class="px-6 py-4 text-left">Fonction</th>
          <th class="px-6 py-4 text-left">Rôle</th>
          <th class="px-6 py-4 text-left">Statut</th>
          <th class="px-6 py-4 text-right">Actions</th>
        </tr>
      </thead>
      <tbody id="usersTable" class="divide-y"></tbody>
    </table>
  </div>
</div>

</main>
</div>

<!-- MODAL -->
<div class="modal fade" id="userModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-xl">

      <div class="modal-header">
        <h5 class="modal-title">Nouvel utilisateur</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="userForm" class="space-y-3">

          <input id="uName" class="form-control" placeholder="Nom complet" required>
          <input id="uUsername" class="form-control" placeholder="prenom.nom" required>
          <input id="uFonction" class="form-control" placeholder="Fonction" required>

          <select id="uRole" class="form-select">
            <option value="operateur">Opérateur</option>
            <option value="admin">Admin</option>
            <option value="directeur">Directeur</option>
          </select>

          <input id="uPassword" type="password" class="form-control" placeholder="Mot de passe" required>
          <input id="uConfirmPassword" type="password" class="form-control" placeholder="Confirmer mot de passe" required>

        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button class="btn btn-success" id="saveUserBtn">Créer</button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/sidebar.js"></script>
<script type="module" src="../js/utilisateurs.js"></script>

</body>
</html>
