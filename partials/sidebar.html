<!-- ===============================
     SIDEBAR + STYLE INTÉGRÉ (MINI MODE)
     =============================== -->
<style>
  /* ===== SIDEBAR CORE ===== */
  .sidebar {
    width: 260px;
    min-height: 100vh;
    background: linear-gradient(180deg, #0B5C6B, #083F4A);
    color: #fff;
    display: flex;
    flex-direction: column;
    position: relative;
    transition: width 0.25s ease;
  }

  /* ===== HEADER ===== */
  .sidebar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem;
    border-bottom: 1px solid rgba(255,255,255,0.15);
  }

  .brand {
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    white-space: nowrap;
  }

  /* ===== TOGGLE BUTTON (INTERNE) ===== */
  .sidebar-toggle-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    font-size: 0.75rem;
    padding: 0.35rem 0.55rem;
    border-radius: 0.35rem;
    cursor: pointer;
  }

  .sidebar-toggle-btn:hover {
    background: rgba(255,255,255,0.3);
  }

  /* ===== SECTIONS ===== */
  .sidebar-section {
    padding: 0.75rem 1rem 0.25rem;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.6);
  }

  /* ===== LINKS ===== */
  .sidebar .nav-link {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.7rem 1rem;
    color: #e0f2f1;
    text-decoration: none;
    font-size: 0.9rem;
    transition: background 0.2s ease;
    white-space: nowrap;
  }

  .sidebar .nav-link i {
    font-size: 1rem;
    min-width: 20px;
    text-align: center;
  }

  .sidebar .nav-link:hover {
    background: rgba(255,255,255,0.08);
  }

  .sidebar .nav-link.active {
    background: #2E7D32;
    color: #fff;
    border-radius: 0.35rem;
    margin: 0 0.5rem;
  }

  /* ===== MINI MODE ===== */
  body.sidebar-mini .sidebar {
    width: 72px;
  }

  body.sidebar-mini .brand,
  body.sidebar-mini .sidebar-section,
  body.sidebar-mini .nav-text {
    display: none;
  }

  body.sidebar-mini .nav-link {
    justify-content: center;
  }

  body.sidebar-mini .sidebar-toggle-btn {
    transform: rotate(180deg);
  }

  /* ===== MAIN PUSH ===== */
  .main {
    margin-left: 260px;
    transition: margin-left 0.25s ease;
  }

  body.sidebar-mini .main {
    margin-left: 72px;
  }

  /* ===== MOBILE ===== */
  @media (max-width: 767px) {
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1050;
      transform: translateX(-100%);
      width: 260px;
    }

    body.sidebar-open .sidebar {
      transform: translateX(0);
    }

    .main {
      margin-left: 0 !important;
    }
  }
</style>

<aside class="sidebar" id="sidebar">

  <div class="sidebar-header">
    <div class="brand">FKM ENERGY</div>
    <button id="sidebarToggleInternal" class="sidebar-toggle-btn">❮</button>
  </div>

  <div class="sidebar-section">Pilotage</div>
  <a class="nav-link" href="../admin/dashboard.html">
    <i class="bi bi-speedometer2"></i>
    <span class="nav-text">Dashboard</span>
  </a>

  <div class="sidebar-section">Stock</div>
  <a class="nav-link" href="../admin/inventaire.html">
    <i class="bi bi-box-seam"></i>
    <span class="nav-text">Inventaire</span>
  </a>
  <a class="nav-link" href="../admin/transactions.html">
    <i class="bi bi-arrow-left-right"></i>
    <span class="nav-text">Transactions</span>
  </a>

  <div class="sidebar-section">Partenaires</div>
  <a class="nav-link" href="../pages/clients.html">
    <i class="bi bi-people"></i>
    <span class="nav-text">Clients</span>
  </a>
  <a class="nav-link" href="../pages/fournisseurs.html">
    <i class="bi bi-truck"></i>
    <span class="nav-text">Fournisseurs</span>
  </a>

  <div class="sidebar-section">Administration</div>
  <a class="nav-link" href="../pages/utilisateurs.html">
    <i class="bi bi-person-gear"></i>
    <span class="nav-text">Utilisateurs</span>
  </a>
  <a class="nav-link" href="../pages/audit-securite.html">
    <i class="bi bi-shield-lock"></i>
    <span class="nav-text">Audit & Sécurité</span>
  </a>

</aside>

<script>
  const toggleBtn = document.getElementById("sidebarToggleInternal");

  toggleBtn.addEventListener("click", () => {
    if (window.innerWidth >= 768) {
      document.body.classList.toggle("sidebar-mini");
    } else {
      document.body.classList.toggle("sidebar-open");
    }
  });

  /* Active menu auto */
  const currentPath = window.location.pathname;
  document.querySelectorAll(".sidebar .nav-link").forEach(link => {
    if (currentPath.endsWith(new URL(link.href).pathname)) {
      link.classList.add("active");
    }
  });
</script>
