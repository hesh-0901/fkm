<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Facture FKM ENERGY</title>

<style>

/* ============================= */
/* FORMAT A4 PROPRE */
/* ============================= */

@page {
  size: A4;
  margin: 15mm;
}


body {
  font-family: Arial, sans-serif;
  font-size: 12px;
  margin: 0;
  background: #fff;
}

/* Conteneur principal */
.invoice-wrapper {
width: 148mm;
min-height: 210mm;
padding: 15mm;
  
table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

table th, table td {
  word-wrap: break-word;
}

/* ============================= */
/* HEADER */
/* ============================= */

.header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 15px;
}

.logo img {
  width: 110px;
}

.company-info {
  text-align: right;
  font-size: 11px;
  line-height: 1.4;
}

.invoice-title {
  text-align: center;
  font-size: 18px;
  font-weight: bold;
  border-top: 2px solid #000;
  border-bottom: 2px solid #000;
  padding: 6px 0;
  margin: 15px 0;
}

/* ============================= */
/* META INFO */
/* ============================= */

.meta {
  display: flex;
  justify-content: space-between;
  margin-bottom: 15px;
  font-size: 12px;
}

/* ============================= */
/* TABLE PRODUITS */
/* ============================= */

table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 15px;
  page-break-inside: auto;
}

table th, table td {
  border: 1px solid #000;
  padding: 6px;
  text-align: center;
}

table th {
  background: #f0f0f0;
  font-weight: bold;
}

tr {
  page-break-inside: avoid;
  page-break-after: auto;
}

/* ============================= */
/* TOTAL SECTION */
/* ============================= */

.total-section {
  width: 50%;
  margin-left: auto;
}

.total-section td {
  padding: 6px;
  border: 1px solid #000;
}

.total-section tr:last-child td {
  font-weight: bold;
  background: #f3f3f3;
}

/* ============================= */
/* FOOTER */
/* ============================= */

.footer {
  margin-top: 25px;
  font-size: 11px;
  text-align: center;
  border-top: 1px solid #ccc;
  padding-top: 10px;
}

/* ============================= */
/* PRINT BUTTON */
/* ============================= */

.print-btn {
  text-align: center;
  margin: 15px;
}

.print-btn button {
  padding: 8px 16px;
  border: none;
  background: #0B5C6B;
  color: #fff;
  cursor: pointer;
  border-radius: 5px;
}

@media print {
  .print-btn {
    display: none;
  }
}

</style>
</head>

<body>

<div class="print-btn">
  <button onclick="window.print()">Imprimer</button>
</div>

<div class="invoice-wrapper">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <img src="../assets/logofkm.png" alt="FKM Logo">
    </div>
    <div class="company-info">
      <strong>FKM ENERGY</strong><br>
      RCCM: CD/LUB/0000<br>
      N° IMPOT: A123456<br>
      Lubumbashi, RDC<br>
      Tel: +243 xxx xxx xxx
    </div>
  </div>

  <!-- TITLE -->
  <div class="invoice-title">
    FACTURE
  </div>

  <!-- META -->
  <div class="meta">
    <div>
      <strong>Facture N° :</strong> <span id="invoiceNumber"></span><br>
      <strong>Date :</strong> <span id="invoiceDate"></span>
    </div>
    <div>
      <strong>Client :</strong><br>
      <span id="clientName"></span>
    </div>
  </div>

  <!-- PRODUITS -->
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Produit</th>
        <th>Qté</th>
        <th>PU (USD)</th>
        <th>Total (USD)</th>
      </tr>
    </thead>
    <tbody id="itemsBody"></tbody>
  </table>

  <!-- TOTALS -->
  <table class="total-section">
    <tr>
      <td>Sous-total :</td>
      <td id="subtotalAmount"></td>
    </tr>
    <tr>
      <td>Remise (<span id="discountPercentDisplay"></span>%) :</td>
      <td id="discountAmount"></td>
    </tr>
    <tr>
      <td>TVA (16%) :</td>
      <td id="tvaAmount"></td>
    </tr>
    <tr>
      <td>Total Final :</td>
      <td id="grandTotal"></td>
    </tr>
  </table>

  <!-- FOOTER -->
  <div class="footer">
    Merci pour votre confiance.<br>
    Les marchandises vendues ne sont ni reprises ni échangées.
  </div>

</div>

</body>
</html>
