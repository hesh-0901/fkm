<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#0B5C6B",
            success: "#2E7D32",
            warning: "#D4A017",
            danger: "#DC2626",
            bg: "#F5F7FA",
            muted: "#6B7280"
          }
        }
      }
    }
  </script>

  <link rel="icon" href="data:,">
</head>

<body class="bg-bg text-slate-800">

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <main id="mainContent" class="flex-1 px-6 py-6 space-y-6 overflow-x-hidden">

    <!-- TOPBAR (IDENTIQUE INVENTAIRE) -->
    <div class="bg-white rounded-xl shadow-sm px-6 py-4 flex items-center justify-between">

      <div class="flex items-center gap-3">
        <button id="toggleSidebar"
                class="p-2 rounded-lg border border-slate-200 hover:bg-slate-100 transition">
          <i class="bi bi-list"></i>
        </button>
        <div>
          <h1 class="text-lg font-semibold leading-tight">Dashboard</h1>
          <p class="text-xs text-muted">Vue d'ensemble du système</p>
        </div>
      </div>

      <div class="flex items-center gap-6">
        <div class="text-right">
          <div id="userName" class="font-semibold leading-tight">—</div>
          <div id="userRole" class="text-sm text-muted">—</div>
        </div>

        <button id="logoutBtn"
                class="px-4 py-2 rounded-lg border border-red-200 text-danger hover:bg-red-50 transition">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- KPI CARDS -->
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">

      <div class="bg-white rounded-xl shadow-sm p-5">
        <div class="text-xs text-muted">Produits</div>
        <div id="kpiProducts" class="text-2xl font-semibold mt-2">0</div>
      </div>

      <div class="bg-white rounded-xl shadow-sm p-5">
        <div class="text-xs text-muted">Stock faible</div>
        <div id="kpiLowStock" class="text-2xl font-semibold mt-2 text-danger">0</div>
      </div>

      <div class="bg-white rounded-xl shadow-sm p-5">
        <div class="text-xs text-muted">Transactions en attente</div>
        <div id="kpiPending" class="text-2xl font-semibold mt-2 text-warning">0</div>
      </div>

      <div class="bg-white rounded-xl shadow-sm p-5">
        <div class="text-xs text-muted">Ventes approuvées</div>
        <div id="kpiApproved" class="text-2xl font-semibold mt-2 text-success">0</div>
      </div>

    </div>

    <!-- CHARTS ROW -->
    <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">

      <!-- VENTES PAR STATUT -->
      <div class="bg-white rounded-xl shadow-sm p-5">
        <h3 class="text-sm font-semibold mb-4">Transactions par statut</h3>
        <div id="chartStatus"></div>
      </div>

      <!-- STOCK PAR PRODUIT -->
      <div class="bg-white rounded-xl shadow-sm p-5">
        <h3 class="text-sm font-semibold mb-4">Top produits en stock</h3>
        <div id="chartStock"></div>
      </div>

    </div>

    <!-- ALERTES INTELLIGENTES -->
    <div class="bg-white rounded-xl shadow-sm p-5">
      <h3 class="text-sm font-semibold mb-4">Alertes intelligentes</h3>
      <ul id="alertsList" class="space-y-2 text-sm"></ul>
    </div>

  </main>
</div>

<!-- ApexCharts -->
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/sidebar.js"></script>
<script type="module" src="../js/dashboard.js"></script>

</body>
</html>
