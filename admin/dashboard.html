<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#0B5C6B",
            primaryDark: "#083F4A",
            success: "#2E7D32",
            warning: "#D4A017",
            danger: "#DC2626",
            bg: "#F5F7FA",
            muted: "#6B7280"
          }
        }
      }
    }
  </script>

  <link rel="icon" href="data:,">
</head>

<body class="bg-bg text-slate-800">

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <main class="flex-1 px-6 py-6 space-y-6 overflow-x-hidden">

    <!-- ================= TOPBAR ================= -->
    <div class="bg-white rounded-xl shadow-sm px-6 py-4 flex items-center justify-between">

      <div class="flex items-center gap-3">
        <button id="toggleSidebar"
                class="p-2 rounded-lg border border-slate-200 hover:bg-slate-100 transition">
          <i class="bi bi-list"></i>
        </button>

        <div>
          <h1 class="text-lg font-semibold leading-tight">Dashboard</h1>
          <p class="text-xs text-muted">Vue d'ensemble du système</p>
        </div>
      </div>

      <div class="flex items-center gap-6">
        <div class="text-right">
          <div id="userName" class="font-semibold leading-tight">—</div>
          <div id="userRole" class="text-sm text-muted">—</div>
        </div>

        <button id="logoutBtn"
                class="px-4 py-2 rounded-lg border border-red-200 text-danger hover:bg-red-50 transition">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- ================= KPI ================= -->
    <div class="grid sm:grid-cols-2 xl:grid-cols-4 gap-6">

      <!-- Produits -->
      <div class="relative bg-gradient-to-br from-primary to-primaryDark text-white rounded-2xl shadow-xl p-6 overflow-hidden hover:-translate-y-1 transition">
        <div class="absolute -right-6 -top-6 text-white/10 text-8xl">
          <i class="bi bi-box-seam"></i>
        </div>
        <div class="flex justify-between items-center">
          <div>
            <p class="text-sm opacity-80">Produits</p>
            <h2 id="totalProducts" class="text-4xl font-bold mt-2">0</h2>
          </div>
          <i class="bi bi-box text-5xl opacity-80"></i>
        </div>
      </div>

      <!-- Stock critique -->
      <div class="relative bg-gradient-to-br from-red-500 to-red-700 text-white rounded-2xl shadow-xl p-6 overflow-hidden hover:-translate-y-1 transition">
        <div class="absolute -right-6 -top-6 text-white/10 text-8xl">
          <i class="bi bi-exclamation-triangle"></i>
        </div>
        <div class="flex justify-between items-center">
          <div>
            <p class="text-sm opacity-80">Stock critique</p>
            <h2 id="lowStock" class="text-4xl font-bold mt-2">0</h2>
          </div>
          <i class="bi bi-graph-down text-5xl opacity-80"></i>
        </div>
      </div>

      <!-- Pending -->
      <div class="relative bg-gradient-to-br from-amber-400 to-amber-600 text-white rounded-2xl shadow-xl p-6 overflow-hidden hover:-translate-y-1 transition">
        <div class="absolute -right-6 -top-6 text-white/10 text-8xl">
          <i class="bi bi-hourglass-split"></i>
        </div>
        <div class="flex justify-between items-center">
          <div>
            <p class="text-sm opacity-90">Transactions Pending</p>
            <h2 id="pendingTx" class="text-4xl font-bold mt-2">0</h2>
          </div>
          <i class="bi bi-clock-history text-5xl opacity-80"></i>
        </div>
      </div>

      <!-- Approved -->
      <div class="relative bg-gradient-to-br from-emerald-500 to-emerald-700 text-white rounded-2xl shadow-xl p-6 overflow-hidden hover:-translate-y-1 transition">
        <div class="absolute -right-6 -top-6 text-white/10 text-8xl">
          <i class="bi bi-check-circle"></i>
        </div>
        <div class="flex justify-between items-center">
          <div>
            <p class="text-sm opacity-90">Ventes approuvées</p>
            <h2 id="approvedTx" class="text-4xl font-bold mt-2">0</h2>
          </div>
          <i class="bi bi-currency-dollar text-5xl opacity-80"></i>
        </div>
      </div>

    </div>

    <!-- ================= ACTIVITÉS + STOCK ================= -->
    <div class="grid lg:grid-cols-2 gap-6">

      <!-- ACTIVITÉS PREMIUM -->
      <div class="bg-white rounded-2xl shadow-xl p-6 border border-slate-100">

        <div class="flex items-center justify-between mb-6">
          <h3 class="font-semibold text-base">Activités récentes</h3>
          <i class="bi bi-activity text-primary text-3xl"></i>
        </div>

        <!-- Timeline -->
        <div class="relative">

          <!-- Ligne verticale -->
          <div class="absolute left-3 top-0 bottom-0 w-[2px] bg-slate-200"></div>

          <!-- Container -->
          <div id="recentActivities"
               class="space-y-6 max-h-96 overflow-y-auto pr-2">
          </div>

        </div>
      </div>

      <!-- STOCK -->
      <div class="bg-white rounded-2xl shadow-xl p-6 border border-slate-100">
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-semibold text-base">Top produits en stock</h3>
          <i class="bi bi-bar-chart-fill text-primary text-3xl"></i>
        </div>
        <div id="stockChart"></div>
      </div>

    </div>

    <!-- ================= ALERTES ================= -->
    <div class="bg-white rounded-2xl shadow-xl p-6 border border-slate-100">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-semibold text-base">Alertes intelligentes</h3>
        <i class="bi bi-bell-fill text-amber-500 text-3xl"></i>
      </div>
      <div id="alertsList" class="space-y-4 text-sm"></div>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/sidebar.js"></script>
<script type="module" src="../js/dashboard.js"></script>

</body>
</html>
