<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Tailwind (DEV) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#0B5C6B",
            primaryDark: "#083F4A",
            success: "#2E7D32",
            warning: "#D4A017",
            danger: "#DC2626",
            bg: "#F5F7FA",
            muted: "#6B7280"
          }
        }
      }
    }
  </script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:Inter,system-ui}</style>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>

<body class="bg-bg">

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <main id="mainContent" class="flex-1 p-6 space-y-6 overflow-hidden">

    <!-- TOPBAR -->
    <div class="bg-white rounded-xl shadow-sm px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button id="toggleSidebar" class="p-2 rounded-md border hover:bg-gray-100">
          <i class="bi bi-list"></i>
        </button>
        <h1 class="text-lg font-semibold">Dashboard</h1>
      </div>

      <div class="flex items-center gap-4">
        <div class="text-right">
          <div id="userName" class="font-semibold">—</div>
          <div id="userRole" class="text-sm text-muted">—</div>
        </div>
        <button id="logoutBtn" class="px-3 py-2 rounded-md border text-danger hover:bg-red-50">
          Déconnexion
        </button>
      </div>
    </div>

    <!-- KPI -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
      <div class="rounded-xl bg-primary text-white p-5">
        <div class="flex items-center gap-2 text-sm opacity-80">
          <i class="bi bi-box"></i> Produits
        </div>
        <div class="text-3xl font-bold mt-1" id="kpiProducts">—</div>
      </div>

      <div class="rounded-xl bg-warning text-white p-5">
        <div class="flex items-center gap-2 text-sm opacity-80">
          <i class="bi bi-exclamation-triangle"></i> Stock faible
        </div>
        <div class="text-3xl font-bold mt-1" id="kpiLowStock">—</div>
      </div>

      <div class="rounded-xl bg-primaryDark text-white p-5">
        <div class="flex items-center gap-2 text-sm opacity-80">
          <i class="bi bi-hourglass-split"></i> Tx en attente
        </div>
        <div class="text-3xl font-bold mt-1" id="kpiPending">—</div>
      </div>

      <div class="rounded-xl bg-success text-white p-5">
        <div class="flex items-center gap-2 text-sm opacity-80">
          <i class="bi bi-check-circle"></i> Tx validées
        </div>
        <div class="text-3xl font-bold mt-1" id="kpiApproved">—</div>
      </div>
    </div>

    <!-- CONTENT GRID -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- LINE CHART -->
      <div class="lg:col-span-2 bg-white rounded-xl shadow-sm p-5">
        <h3 class="font-semibold mb-3 flex items-center gap-2">
          <i class="bi bi-graph-up"></i> Flux des transactions
        </h3>
        <canvas id="txLineChart" height="120"></canvas>
      </div>

      <!-- ALERTS -->
      <div class="bg-white rounded-xl shadow-sm p-5 flex flex-col">
        <h3 class="font-semibold mb-3 flex items-center gap-2">
          <i class="bi bi-bell"></i> Alertes stock
        </h3>
        <ul id="alertsList" class="text-sm space-y-2 overflow-y-auto max-h-56"></ul>
      </div>

      <!-- ACTIVITY -->
      <div class="lg:col-span-2 bg-white rounded-xl shadow-sm p-5 flex flex-col">
        <h3 class="font-semibold mb-3 flex items-center gap-2">
          <i class="bi bi-clock-history"></i> Activité récente
        </h3>
        <ul id="activityList" class="text-sm space-y-2 overflow-y-auto max-h-56"></ul>
      </div>

      <!-- USERS -->
      <div class="bg-white rounded-xl shadow-sm p-5 flex flex-col">
        <h3 class="font-semibold mb-3 flex items-center gap-2">
          <i class="bi bi-people"></i> Personnel
        </h3>
        <ul id="usersList" class="text-sm space-y-2 overflow-y-auto max-h-56"></ul>
      </div>

    </div>

  </main>
</div>

<script type="module" src="../js/dashboard.js"></script>
<script src="../js/sidebar.js"></script>
</body>
</html>
