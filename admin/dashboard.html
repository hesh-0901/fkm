<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ApexCharts -->
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

  <link rel="icon" href="data:,">
</head>

<body class="bg-bg text-slate-800">

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <main class="flex-1 px-6 py-6 space-y-6 overflow-x-hidden">

    <!-- TOPBAR (même structure Inventaire) -->
    <div class="bg-white rounded-xl shadow-sm px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button id="toggleSidebar"
          class="p-2 rounded-lg border border-slate-200 hover:bg-slate-100 transition">
          <i class="bi bi-list"></i>
        </button>
        <div>
          <h1 class="text-lg font-semibold leading-tight">Dashboard</h1>
          <p class="text-xs text-muted">Vue d'ensemble du système</p>
        </div>
      </div>

      <div class="flex items-center gap-6">
        <div class="text-right">
          <div id="userName" class="font-semibold leading-tight">—</div>
          <div id="userRole" class="text-sm text-muted">—</div>
        </div>
        <button id="logoutBtn"
          class="px-4 py-2 rounded-lg border border-red-200 text-danger hover:bg-red-50 transition">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- KPI -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">

      <div class="bg-gradient-to-br from-blue-500 to-blue-600 text-white rounded-xl shadow-lg p-6 flex justify-between items-center">
        <div>
          <p class="text-sm opacity-80">Produits</p>
          <h2 id="kpiProducts" class="text-3xl font-bold mt-2">0</h2>
        </div>
        <i class="bi bi-box-seam text-5xl opacity-80"></i>
      </div>

      <div class="bg-gradient-to-br from-red-500 to-red-600 text-white rounded-xl shadow-lg p-6 flex justify-between items-center">
        <div>
          <p class="text-sm opacity-80">Stock critique</p>
          <h2 id="kpiLowStock" class="text-3xl font-bold mt-2">0</h2>
        </div>
        <i class="bi bi-exclamation-triangle-fill text-5xl opacity-80"></i>
      </div>

      <div class="bg-gradient-to-br from-amber-400 to-orange-500 text-white rounded-xl shadow-lg p-6 flex justify-between items-center">
        <div>
          <p class="text-sm opacity-80">En attente</p>
          <h2 id="kpiPending" class="text-3xl font-bold mt-2">0</h2>
        </div>
        <i class="bi bi-hourglass-split text-5xl opacity-80"></i>
      </div>

      <div class="bg-gradient-to-br from-emerald-500 to-green-600 text-white rounded-xl shadow-lg p-6 flex justify-between items-center">
        <div>
          <p class="text-sm opacity-80">Validées</p>
          <h2 id="kpiApproved" class="text-3xl font-bold mt-2">0</h2>
        </div>
        <i class="bi bi-check-circle-fill text-5xl opacity-80"></i>
      </div>

    </div>

    <!-- CHARTS -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

      <div class="bg-white rounded-xl shadow-lg p-6">
        <h3 class="font-semibold mb-4">Transactions par statut</h3>
        <div id="chartStatus"></div>
      </div>

      <div class="bg-white rounded-xl shadow-lg p-6">
        <h3 class="font-semibold mb-4">Top produits en stock</h3>
        <div id="chartStock"></div>
      </div>

    </div>

    <!-- ALERTES -->
    <div class="bg-white rounded-xl shadow-lg p-6">
      <h3 class="font-semibold mb-4 flex items-center gap-2">
        <i class="bi bi-bell-fill text-warning text-xl"></i>
        Alertes intelligentes
      </h3>
      <ul id="alertsList" class="space-y-3 text-sm"></ul>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/sidebar.js"></script>
<script type="module" src="../js/dashboard.js"></script>

</body>
</html>
