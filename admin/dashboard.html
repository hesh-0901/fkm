<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- ApexCharts -->
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#0B5C6B",
            success: "#2E7D32",
            warning: "#D4A017",
            danger: "#DC2626",
            bg: "#F5F7FA",
            muted: "#6B7280"
          }
        }
      }
    }
  </script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:Inter,system-ui}</style>

  <link rel="icon" href="data:,">
</head>

<body class="bg-bg text-slate-800">

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <main class="flex-1 px-6 py-6 space-y-6 overflow-x-hidden">

    <!-- ================= TOPBAR ================= -->
    <div class="bg-white rounded-xl shadow-sm px-6 py-4 flex items-center justify-between">

      <div class="flex items-center gap-3">
        <button id="toggleSidebar"
                class="p-2 rounded-lg border border-slate-200 hover:bg-slate-100 transition">
          <i class="bi bi-list"></i>
        </button>

        <div>
          <h1 class="text-lg font-semibold">Dashboard</h1>
          <p class="text-xs text-muted">Vue globale & analyse stratégique</p>
        </div>
      </div>

      <div class="flex items-center gap-6">
        <div class="text-right">
          <div id="userName" class="font-semibold">—</div>
          <div id="userRole" class="text-sm text-muted">—</div>
        </div>

        <button id="logoutBtn"
                class="px-4 py-2 rounded-lg border border-red-200 text-danger hover:bg-red-50 transition">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- ================= KPI ROW ================= -->
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">

      <!-- CA MOIS -->
      <div class="bg-white rounded-xl shadow-sm p-5">
        <div class="flex justify-between items-center">
          <span class="text-sm text-muted">Chiffre d'affaires (Mois)</span>
          <i class="bi bi-currency-dollar text-success text-lg"></i>
        </div>
        <div id="kpiMonth" class="text-2xl font-semibold mt-2">0</div>
      </div>

      <!-- CA TOTAL -->
      <div class="bg-white rounded-xl shadow-sm p-5">
        <div class="flex justify-between items-center">
          <span class="text-sm text-muted">Chiffre d'affaires Total</span>
          <i class="bi bi-graph-up text-primary text-lg"></i>
        </div>
        <div id="kpiTotal" class="text-2xl font-semibold mt-2">0</div>
      </div>

      <!-- STOCK CRITIQUE -->
      <div class="bg-white rounded-xl shadow-sm p-5">
        <div class="flex justify-between items-center">
          <span class="text-sm text-muted">Produits critiques</span>
          <i class="bi bi-exclamation-triangle text-danger text-lg"></i>
        </div>
        <div id="kpiCritical" class="text-2xl font-semibold mt-2">0</div>
      </div>

      <!-- PENDING -->
      <div class="bg-white rounded-xl shadow-sm p-5">
        <div class="flex justify-between items-center">
          <span class="text-sm text-muted">Transactions en attente</span>
          <i class="bi bi-hourglass-split text-warning text-lg"></i>
        </div>
        <div id="kpiPending" class="text-2xl font-semibold mt-2">0</div>
      </div>

    </div>

    <!-- ================= ALERTES ================= -->
    <div id="alertsContainer" class="space-y-3"></div>

    <!-- ================= GRAPHIQUES ================= -->
    <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">

      <!-- CA 7 JOURS -->
      <div class="bg-white rounded-xl shadow-sm p-5">
        <h3 class="text-sm font-semibold mb-4">Chiffre d'affaires — 7 derniers jours</h3>
        <div id="chartRevenue"></div>
      </div>

      <!-- DONUT STATUT -->
      <div class="bg-white rounded-xl shadow-sm p-5">
        <h3 class="text-sm font-semibold mb-4">Répartition des transactions</h3>
        <div id="chartStatus"></div>
      </div>

    </div>

    <!-- ================= TOP PRODUITS ================= -->
    <div class="bg-white rounded-xl shadow-sm p-5">
      <h3 class="text-sm font-semibold mb-4">Top Produits (Ventes)</h3>
      <div id="chartProducts"></div>
    </div>

  </main>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/sidebar.js"></script>
<script type="module" src="../js/dashboard.js"></script>

</body>
</html>
