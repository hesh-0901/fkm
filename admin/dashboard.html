<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/dashboard.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>

<body>
<div class="app">

  <div id="sidebar-container"></div>

  <main class="main">

    <!-- TOPBAR -->
    <div class="topbar mb-3">
      <button class="btn btn-outline-secondary btn-sm" id="toggleSidebar">
        <i class="bi bi-list"></i>
      </button>

      <h1 class="page-title">Dashboard</h1>

      <div class="d-flex align-items-center gap-3">
        <div class="text-end">
          <div class="user-name" id="userName">—</div>
          <div class="user-role" id="userRole">—</div>
        </div>
        <button class="btn btn-outline-danger btn-sm" id="logoutBtn">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- KPI -->
    <div class="row g-3 mb-4">
      <div class="col-md-3"><div class="card kpi-card kpi-blue"><div class="card-body"><div class="kpi-label">Produits</div><div class="kpi-value" id="kpiProducts">—</div></div></div></div>
      <div class="col-md-3"><div class="card kpi-card kpi-gold"><div class="card-body"><div class="kpi-label">Stock faible</div><div class="kpi-value" id="kpiLowStock">—</div></div></div></div>
      <div class="col-md-3"><div class="card kpi-card kpi-blue"><div class="card-body"><div class="kpi-label">Transactions en attente</div><div class="kpi-value" id="kpiPending">—</div></div></div></div>
      <div class="col-md-3"><div class="card kpi-card kpi-green"><div class="card-body"><div class="kpi-label">Transactions validées</div><div class="kpi-value" id="kpiApproved">—</div></div></div></div>
    </div>

    <div class="row g-4">

      <!-- CHART -->
      <div class="col-md-8">
        <div class="card">
          <div class="card-body">
            <h6>Entrées / Sorties</h6>
            <canvas id="txChart" height="120"></canvas>
          </div>
        </div>
      </div>

      <!-- ALERTS -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-body">
            <h6>Alertes stock</h6>
            <ul class="list-group list-group-flush" id="alertsList"></ul>
          </div>
        </div>
      </div>

      <!-- ACTIVITY -->
      <div class="col-md-8">
        <div class="card">
          <div class="card-body">
            <h6>Activité récente</h6>
            <ul class="list-group list-group-flush" id="activityList"></ul>
          </div>
        </div>
      </div>

      <!-- USERS -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-body">
            <h6>Personnel</h6>
            <ul class="list-group list-group-flush" id="usersList"></ul>
          </div>
        </div>
      </div>

    </div>

  </main>
</div>

<script type="module" src="../js/dashboard.js"></script>
<script src="../js/sidebar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
