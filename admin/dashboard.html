<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ApexCharts -->
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

  <link rel="icon" href="data:,">
</head>

<body class="bg-bg text-slate-800">

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <main class="flex-1 px-6 py-6 space-y-6">

    <!-- HEADER -->
    <div class="bg-white rounded-xl shadow-sm px-6 py-4 flex justify-between items-center">
      <div>
        <h1 class="text-lg font-semibold">Dashboard</h1>
        <p class="text-xs text-muted">Vue globale & analytique</p>
      </div>

      <div class="flex items-center gap-6">
        <div class="text-right">
          <div id="userName" class="font-semibold">—</div>
          <div id="userRole" class="text-sm text-muted">—</div>
        </div>
        <button id="logoutBtn"
          class="px-4 py-2 rounded-lg border border-red-200 text-danger hover:bg-red-50 transition">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- FILTRES -->
    <div class="flex gap-3 flex-wrap">
      <button class="btn btn-sm btn-light filter-btn" data-range="all">Global</button>
      <button class="btn btn-sm btn-light filter-btn" data-range="today">Aujourd’hui</button>
      <button class="btn btn-sm btn-light filter-btn" data-range="7">7 jours</button>
      <button class="btn btn-sm btn-light filter-btn" data-range="30">30 jours</button>
    </div>

    <!-- KPI -->
    <div id="kpiContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>

    <!-- FINANCE KPI -->
    <div id="financeContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>

    <!-- CHARTS -->
    <div class="grid lg:grid-cols-2 gap-6">
      <div class="bg-white p-4 rounded-xl shadow-sm">
        <div id="areaChart"></div>
      </div>
      <div class="bg-white p-4 rounded-xl shadow-sm">
        <div id="donutChart"></div>
      </div>
    </div>

  </main>
</div>

<script src="../js/sidebar.js"></script>
<script type="module" src="../js/dashboard.js"></script>

</body>
</html>
