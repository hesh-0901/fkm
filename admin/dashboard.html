<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#0B5C6B",
            primaryDark: "#083F4A",
            success: "#2E7D32",
            warning: "#D4A017",
            danger: "#DC2626",
            bg: "#F5F7FA",
            muted: "#6B7280"
          }
        }
      }
    }
  </script>

  <link rel="icon" href="data:,">
</head>

<body class="bg-bg text-slate-800">

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <main id="mainContent" class="flex-1 px-6 py-6 space-y-6 overflow-x-hidden">

    <!-- TOPBAR -->
    <div class="bg-white rounded-xl shadow-sm px-6 py-4 flex items-center justify-between">

      <div class="flex items-center gap-3">
        <button id="toggleSidebar"
                class="p-2 rounded-lg border border-slate-200 hover:bg-slate-100 transition">
          <i class="bi bi-list"></i>
        </button>

        <div>
          <h1 class="text-lg font-semibold">Dashboard</h1>
          <p class="text-xs text-muted">Vue d'ensemble du système</p>
        </div>
      </div>

      <div class="flex items-center gap-6">

        <!-- FILTRE PÉRIODE -->
        <select id="periodFilter"
          class="px-3 py-2 rounded-lg border border-slate-200 text-sm">
          <option value="ALL">Toutes périodes</option>
          <option value="TODAY">Aujourd’hui</option>
        </select>

        <div class="text-right">
          <div id="userName" class="font-semibold">—</div>
          <div id="userRole" class="text-sm text-muted">—</div>
        </div>

        <button id="logoutBtn"
                class="px-4 py-2 rounded-lg border border-red-200 text-danger hover:bg-red-50 transition">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- KPI -->
    <div class="grid sm:grid-cols-2 xl:grid-cols-4 gap-6">

      <div class="bg-gradient-to-br from-primary to-primaryDark text-white rounded-2xl shadow-xl p-6">
        <p class="text-sm opacity-80">Produits</p>
        <h2 id="totalProducts" class="text-4xl font-bold mt-2">0</h2>
      </div>

      <div class="bg-gradient-to-br from-red-500 to-red-700 text-white rounded-2xl shadow-xl p-6">
        <p class="text-sm opacity-80">Stock critique</p>
        <h2 id="lowStock" class="text-4xl font-bold mt-2">0</h2>
      </div>

      <div class="bg-gradient-to-br from-amber-400 to-amber-600 text-white rounded-2xl shadow-xl p-6">
        <p class="text-sm opacity-80">Transactions Pending</p>
        <h2 id="pendingTx" class="text-4xl font-bold mt-2">0</h2>
      </div>

      <div class="bg-gradient-to-br from-emerald-500 to-emerald-700 text-white rounded-2xl shadow-xl p-6">
        <p class="text-sm opacity-80">Ventes approuvées</p>
        <h2 id="approvedTx" class="text-4xl font-bold mt-2">0</h2>
      </div>

    </div>

    <!-- GRID PRINCIPAL -->
    <div class="grid lg:grid-cols-2 gap-6">

      <!-- ACTIVITÉS -->
      <div class="bg-white rounded-2xl shadow-xl p-6 border border-slate-100">
        <div class="flex justify-between mb-6">
          <h3 class="font-semibold text-base">Activités récentes</h3>
          <i class="bi bi-activity text-primary text-2xl"></i>
        </div>
        <div id="recentActivities" class="space-y-4 max-h-96 overflow-y-auto"></div>
      </div>

      <!-- TOP STOCK -->
      <div class="bg-white rounded-2xl shadow-xl p-6 border border-slate-100">
        <div class="flex justify-between mb-6">
          <h3 class="font-semibold text-base">Top produits en stock</h3>
          <i class="bi bi-box-fill text-primary text-2xl"></i>
        </div>
        <div id="stockPremiumList" class="space-y-4"></div>
      </div>

      <!-- PERFORMANCE MARKETEUR -->
      <div class="bg-white rounded-2xl shadow-xl p-6 border border-slate-100">
        <div class="flex justify-between mb-6">
          <h3 class="font-semibold text-base">Performance des marketeurs</h3>
          <i class="bi bi-people-fill text-primary text-2xl"></i>
        </div>
        <div id="marketerPerformanceList" class="space-y-4"></div>
      </div>

      <!-- RÉSUMÉ AUDIT -->
      <div class="bg-white rounded-2xl shadow-xl p-6 border border-slate-100">
        <div class="flex justify-between mb-6">
          <h3 class="font-semibold text-base">Résumé Audit</h3>
          <i class="bi bi-shield-check text-emerald-600 text-2xl"></i>
        </div>
        <div id="auditSummaryList" class="space-y-4"></div>
      </div>

      <!-- ALERTES -->
      <div class="lg:col-span-2 bg-white rounded-2xl shadow-xl p-6 border border-slate-100">
        <div class="flex justify-between mb-4">
          <h3 class="font-semibold text-base">Alertes intelligentes</h3>
          <i class="bi bi-bell-fill text-amber-500 text-2xl"></i>
        </div>
        <div id="alertsList" class="space-y-4"></div>
      </div>

    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/sidebar.js"></script>
<script type="module" src="../js/dashboard.js"></script>

</body>
</html>
