<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#0B5C6B",
            primaryDark: "#083F4A",
            success: "#2E7D32",
            warning: "#D4A017",
            danger: "#DC2626",
            bg: "#F5F7FA",
            muted: "#6B7280"
          }
        }
      }
    }
  </script>

  <link rel="icon" href="data:,">
</head>

<body class="bg-bg text-slate-800">

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <main id="mainContent" class="flex-1 px-8 py-8 space-y-8 overflow-x-hidden">

<!-- ================= KPI PREMIUM ================= -->
<div class="grid sm:grid-cols-2 xl:grid-cols-4 gap-8">

  <div class="relative bg-gradient-to-br from-primary to-primaryDark text-white rounded-3xl shadow-2xl p-8 overflow-hidden hover:scale-105 transition duration-300">
    <i class="bi bi-box-seam absolute -right-6 -top-6 text-[120px] text-white/10"></i>
    <p class="text-sm opacity-80">Produits</p>
    <h2 id="totalProducts" class="text-5xl font-extrabold mt-3">0</h2>
  </div>

  <div class="relative bg-gradient-to-br from-red-500 to-red-700 text-white rounded-3xl shadow-2xl p-8 overflow-hidden hover:scale-105 transition duration-300">
    <i class="bi bi-exclamation-triangle absolute -right-6 -top-6 text-[120px] text-white/10"></i>
    <p class="text-sm opacity-80">Stock critique</p>
    <h2 id="lowStock" class="text-5xl font-extrabold mt-3">0</h2>
  </div>

  <div class="relative bg-gradient-to-br from-amber-400 to-amber-600 text-white rounded-3xl shadow-2xl p-8 overflow-hidden hover:scale-105 transition duration-300">
    <i class="bi bi-hourglass-split absolute -right-6 -top-6 text-[120px] text-white/10"></i>
    <p class="text-sm opacity-90">Pending</p>
    <h2 id="pendingTx" class="text-5xl font-extrabold mt-3">0</h2>
  </div>

  <div class="relative bg-gradient-to-br from-emerald-500 to-emerald-700 text-white rounded-3xl shadow-2xl p-8 overflow-hidden hover:scale-105 transition duration-300">
    <i class="bi bi-check-circle absolute -right-6 -top-6 text-[120px] text-white/10"></i>
    <p class="text-sm opacity-90">Approuvées</p>
    <h2 id="approvedTx" class="text-5xl font-extrabold mt-3">0</h2>
  </div>

</div>

<!-- ================= STOCK PREMIUM ================= -->
<div class="bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
  <h3 class="text-lg font-semibold mb-6 flex items-center gap-3">
    <i class="bi bi-box-fill text-primary text-2xl"></i>
    Top Stock
  </h3>
  <div id="stockPremiumList" class="space-y-6"></div>
</div>

<!-- ================= PERFORMANCE MARKETEUR ================= -->
<div class="bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
  <h3 class="text-lg font-semibold mb-6 flex items-center gap-3">
    <i class="bi bi-people-fill text-success text-2xl"></i>
    Performance des Marketeurs
  </h3>
  <div id="marketerPerformanceList" class="space-y-6"></div>
</div>

<!-- ================= AUDIT SUMMARY ================= -->
<div class="bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
  <h3 class="text-lg font-semibold mb-6 flex items-center gap-3">
    <i class="bi bi-shield-check text-primary text-2xl"></i>
    Résumé Audit
  </h3>
  <div id="auditSummaryList" class="grid grid-cols-1 sm:grid-cols-3 gap-6"></div>
</div>

</main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/sidebar.js"></script>
<script type="module" src="../js/dashboard.js"></script>

</body>
</html>
