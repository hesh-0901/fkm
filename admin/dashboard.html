<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#0B5C6B",
            primaryDark: "#083F4A",
            success: "#2E7D32",
            warning: "#D4A017",
            danger: "#DC2626",
            bg: "#F5F7FA",
            muted: "#6B7280"
          }
        }
      }
    }
  </script>

  <link rel="icon" href="data:,">
</head>

<body class="bg-bg text-slate-800">

<div class="flex min-h-screen">

  <!-- SIDEBAR (IDENTIQUE INVENTAIRE) -->
  <div id="sidebar-container"></div>

  <!-- MAIN (IDENTIQUE INVENTAIRE) -->
  <main id="mainContent" class="flex-1 px-6 py-6 space-y-6 overflow-x-hidden">

    <!-- TOPBAR (STRUCTURE IDENTIQUE INVENTAIRE) -->
    <div class="bg-white rounded-xl shadow-sm px-6 py-4 flex items-center justify-between">

      <div class="flex items-center gap-3">
        <button id="toggleSidebar"
                class="p-2 rounded-lg border border-slate-200 hover:bg-slate-100 transition">
          <i class="bi bi-list"></i>
        </button>

        <div>
          <h1 class="text-lg font-semibold leading-tight">Dashboard</h1>
          <p class="text-xs text-muted">Vue d'ensemble du système</p>
        </div>
      </div>

      <div class="flex items-center gap-6">
        <div class="text-right">
          <div id="userName" class="font-semibold leading-tight">—</div>
          <div id="userRole" class="text-sm text-muted">—</div>
        </div>

        <button id="logoutBtn"
                class="px-4 py-2 rounded-lg border border-red-200 text-danger hover:bg-red-50 transition">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- KPI CARDS -->
    <div class="grid md:grid-cols-4 gap-6">

      <div class="bg-white rounded-xl shadow-sm p-5">
        <div class="flex justify-between items-center">
          <div>
            <p class="text-sm text-muted">Produits</p>
            <h2 id="totalProducts" class="text-2xl font-bold mt-1">0</h2>
          </div>
          <i class="bi bi-box-seam text-primary text-3xl"></i>
        </div>
      </div>

      <div class="bg-white rounded-xl shadow-sm p-5">
        <div class="flex justify-between items-center">
          <div>
            <p class="text-sm text-muted">Stock faible</p>
            <h2 id="lowStock" class="text-2xl font-bold text-danger mt-1">0</h2>
          </div>
          <i class="bi bi-exclamation-triangle text-danger text-3xl"></i>
        </div>
      </div>

      <div class="bg-white rounded-xl shadow-sm p-5">
        <div class="flex justify-between items-center">
          <div>
            <p class="text-sm text-muted">Transactions en attente</p>
            <h2 id="pendingTx" class="text-2xl font-bold text-warning mt-1">0</h2>
          </div>
          <i class="bi bi-hourglass-split text-warning text-3xl"></i>
        </div>
      </div>

      <div class="bg-white rounded-xl shadow-sm p-5">
        <div class="flex justify-between items-center">
          <div>
            <p class="text-sm text-muted">Ventes approuvées</p>
            <h2 id="approvedTx" class="text-2xl font-bold text-success mt-1">0</h2>
          </div>
          <i class="bi bi-check-circle text-success text-3xl"></i>
        </div>
      </div>

    </div>

    <!-- GRAPHIQUES -->
    <div class="grid md:grid-cols-2 gap-6">

      <div class="bg-white rounded-xl shadow-sm p-6">
        <h3 class="font-semibold mb-4">Transactions par statut</h3>
        <div id="txChart"></div>
      </div>

      <div class="bg-white rounded-xl shadow-sm p-6">
        <h3 class="font-semibold mb-4">Top produits en stock</h3>
        <div id="stockChart"></div>
      </div>

    </div>

    <!-- ALERTES -->
    <div class="bg-white rounded-xl shadow-sm p-6">
      <h3 class="font-semibold mb-3">Alertes intelligentes</h3>
      <ul id="alertsList" class="space-y-2 text-sm"></ul>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/sidebar.js"></script>
<script type="module" src="../js/dashboard.js"></script>

</body>
</html>
