<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#0B5C6B",
            success: "#2E7D32",
            warning: "#D4A017",
            danger: "#DC2626",
            bg: "#F5F7FA",
            muted: "#6B7280"
          }
        }
      }
    }
  </script>

  <!-- ApexCharts -->
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

  <link rel="icon" href="data:,">
</head>

<body class="bg-bg text-slate-800">

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <main class="flex-1 px-6 py-6 space-y-6 overflow-x-hidden">

    <!-- TOPBAR -->
    <div class="bg-white rounded-xl shadow-sm px-6 py-4 flex items-center justify-between">

      <div class="flex items-center gap-3">
        <button id="toggleSidebar"
                class="p-2 rounded-lg border border-slate-200 hover:bg-slate-100 transition">
          <i class="bi bi-list"></i>
        </button>
        <div>
          <h1 class="text-lg font-semibold leading-tight">Dashboard</h1>
          <p class="text-xs text-muted">Vue d’ensemble des performances</p>
        </div>
      </div>

      <div class="flex items-center gap-6">
        <div class="text-right">
          <div id="userName" class="font-semibold leading-tight">—</div>
          <div id="userFunction" class="text-sm text-muted">—</div>
        </div>

        <button id="logoutBtn"
                class="px-4 py-2 rounded-lg border border-red-200 text-danger hover:bg-red-50 transition">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- KPI CARDS -->
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">

      <div class="bg-white p-6 rounded-xl shadow-sm">
        <p class="text-sm text-muted">Chiffre d'affaires</p>
        <h3 id="totalRevenue" class="text-2xl font-semibold mt-2">0 USD</h3>
      </div>

      <div class="bg-white p-6 rounded-xl shadow-sm">
        <p class="text-sm text-muted">Transactions en attente</p>
        <h3 id="pendingCount" class="text-2xl font-semibold mt-2">0</h3>
      </div>

      <div class="bg-white p-6 rounded-xl shadow-sm">
        <p class="text-sm text-muted">Produits critiques</p>
        <h3 id="lowStockCount" class="text-2xl font-semibold mt-2">0</h3>
      </div>

      <div class="bg-white p-6 rounded-xl shadow-sm">
        <p class="text-sm text-muted">Total produits</p>
        <h3 id="totalProducts" class="text-2xl font-semibold mt-2">0</h3>
      </div>

    </div>

    <!-- GRAPHS -->
    <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">

      <div class="bg-white p-6 rounded-xl shadow-sm">
        <h4 class="text-sm font-semibold mb-4">Évolution des ventes</h4>
        <div id="salesChart"></div>
      </div>

      <div class="bg-white p-6 rounded-xl shadow-sm">
        <h4 class="text-sm font-semibold mb-4">Statut des transactions</h4>
        <div id="statusChart"></div>
      </div>

    </div>

    <!-- ALERTES -->
    <div class="bg-white p-6 rounded-xl shadow-sm">
      <h4 class="text-sm font-semibold mb-4">Alertes intelligentes</h4>
      <ul id="alertsList" class="space-y-2 text-sm"></ul>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/sidebar.js"></script>
<script type="module" src="../js/dashboard.js"></script>

</body>
</html>
