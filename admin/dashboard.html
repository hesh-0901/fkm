<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>FKM ENERGY – Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <!-- Dashboard CSS -->
  <link rel="stylesheet" href="../css/dashboard.css">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar collapsed" id="sidebar">

    <div class="sidebar-header">
      <div class="brand">FKM ENERGY</div>
      <button class="btn btn-sm btn-light d-md-none" id="closeSidebar">
        <i class="bi bi-x"></i>
      </button>
    </div>

    <!-- PILOTAGE -->
    <div class="sidebar-section">Pilotage</div>
    <a class="nav-link active" href="#">
      <i class="bi bi-speedometer2"></i>
      <span class="nav-text">Dashboard</span>
    </a>

    <!-- STOCK -->
    <div class="sidebar-section">Stock</div>
    <a class="nav-link" href="#">
      <i class="bi bi-box-seam"></i>
      <span class="nav-text">Inventaire</span>
    </a>
    <a class="nav-link" href="#">
      <i class="bi bi-arrow-left-right"></i>
      <span class="nav-text">Transactions</span>
    </a>

    <!-- PARTENAIRES -->
    <div class="sidebar-section">Partenaires</div>
    <a class="nav-link" href="#">
      <i class="bi bi-people"></i>
      <span class="nav-text">Clients</span>
    </a>
    <a class="nav-link" href="#">
      <i class="bi bi-truck"></i>
      <span class="nav-text">Fournisseurs</span>
    </a>

    <!-- FINANCE -->
    <div class="sidebar-section">Finance</div>
    <a class="nav-link" href="#">
      <i class="bi bi-currency-exchange"></i>
      <span class="nav-text">Taux & Devises</span>
    </a>
    <a class="nav-link" href="#">
      <i class="bi bi-cash-coin"></i>
      <span class="nav-text">Rapports financiers</span>
    </a>

    <!-- ADMIN -->
    <div class="sidebar-section">Administration</div>
    <a class="nav-link" href="#">
      <i class="bi bi-person-gear"></i>
      <span class="nav-text">Utilisateurs</span>
    </a>
    <a class="nav-link" href="#">
      <i class="bi bi-shield-lock"></i>
      <span class="nav-text">Audit & Sécurité</span>
    </a>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <button class="btn btn-outline-secondary btn-sm d-md-none"
              id="openSidebar">
        <i class="bi bi-list"></i>
      </button>

      <h1 class="page-title">Dashboard</h1>

      <div class="d-flex align-items-center gap-3">
        <div class="text-end">
          <div class="user-name" id="userName">—</div>
          <div class="user-role" id="userRole">—</div>
        </div>
        <button class="btn btn-outline-danger btn-sm" id="logoutBtn">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- KPI -->
    <div class="row g-3 mb-3">
      <div class="col-12 col-md-4">
        <div class="card kpi-card kpi-blue">
          <div class="card-body">
            <div class="kpi-label">Stock USD</div>
            <div class="kpi-value">—</div>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-4">
        <div class="card kpi-card kpi-green">
          <div class="card-body">
            <div class="kpi-label">Stock CDF</div>
            <div class="kpi-value">—</div>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-4">
        <div class="card kpi-card kpi-gold">
          <div class="card-body">
            <div class="kpi-label">Articles</div>
            <div class="kpi-value">—</div>
          </div>
        </div>
      </div>
    </div>

    <!-- GRAPH -->
    <div class="card">
      <div class="card-body">
        <strong>Historique de la valeur du stock</strong>
        <div class="chart-placeholder mt-3">
          Graphique (snapshots Firestore)
        </div>
      </div>
    </div>

  </main>
</div>

<script type="module" src="../js/dashboard.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
