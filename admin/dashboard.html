<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">


  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#0B5C6B",
            primaryDark: "#083F4A",
            success: "#2E7D32",
            warning: "#D4A017",
            danger: "#DC2626",
            bg: "#F5F7FA",
            muted: "#6B7280"
          }
        }
      }
    }
  </script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:Inter,system-ui}</style>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <!-- STYLE SIDEBAR -->
  <style>
  .sidebar-link {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.5rem 1.25rem;
    border-radius: 0.5rem;
    color: rgba(255,255,255,0.9);
    transition: background 0.2s ease;
  }

  .sidebar-link:hover {
    background: rgba(255,255,255,0.12);
  }

  .sidebar-icon {
    width: 20px;
    height: 20px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0.75;
  }
</style>
  <!-- STYLE SIDEBAR -->
</head>

<body class="bg-bg">

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <main class="flex-1 p-6 space-y-6">

    <!-- TOPBAR -->
    <div class="bg-white rounded-xl shadow-sm px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button id="toggleSidebar"
          class="p-2 rounded-md border hover:bg-gray-100">
          ☰
        </button>
        <h1 class="text-lg font-semibold">Dashboard</h1>
      </div>

      <div class="flex items-center gap-4">
        <div class="text-right">
          <div id="userName" class="font-semibold">—</div>
          <div id="userRole" class="text-sm text-muted">—</div>
        </div>
        <button id="logoutBtn"
          class="px-3 py-2 rounded-md border text-danger hover:bg-red-50">
          Déconnexion
        </button>
      </div>
    </div>

    <!-- KPI -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
      <div class="rounded-xl bg-primary text-white p-5">
        <div class="text-sm opacity-80">Produits</div>
        <div class="text-2xl font-bold" id="kpiProducts">—</div>
      </div>

      <div class="rounded-xl bg-warning text-white p-5">
        <div class="text-sm opacity-80">Stock faible</div>
        <div class="text-2xl font-bold" id="kpiLowStock">—</div>
      </div>

      <div class="rounded-xl bg-primaryDark text-white p-5">
        <div class="text-sm opacity-80">Transactions en attente</div>
        <div class="text-2xl font-bold" id="kpiPending">—</div>
      </div>

      <div class="rounded-xl bg-success text-white p-5">
        <div class="text-sm opacity-80">Transactions validées</div>
        <div class="text-2xl font-bold" id="kpiApproved">—</div>
      </div>
    </div>

    <!-- CONTENT GRID -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- CHART -->
      <div class="lg:col-span-2 bg-white rounded-xl shadow-sm p-5">
        <h3 class="font-semibold mb-3">Entrées / Sorties</h3>
        <canvas id="txChart" height="120"></canvas>
      </div>

      <!-- ALERTS -->
      <div class="bg-white rounded-xl shadow-sm p-5">
        <h3 class="font-semibold mb-3">Alertes stock</h3>
        <ul id="alertsList" class="space-y-2 text-sm"></ul>
      </div>

      <!-- ACTIVITY -->
      <div class="lg:col-span-2 bg-white rounded-xl shadow-sm p-5">
        <h3 class="font-semibold mb-3">Activité récente</h3>
        <ul id="activityList" class="space-y-2 text-sm"></ul>
      </div>

      <!-- USERS -->
      <div class="bg-white rounded-xl shadow-sm p-5">
        <h3 class="font-semibold mb-3">Personnel</h3>
        <ul id="usersList" class="space-y-2 text-sm"></ul>
      </div>

    </div>

  </main>
</div>

<script type="module" src="../js/dashboard.js"></script>
<script src="../js/sidebar.js"></script>
</body>
</html>
