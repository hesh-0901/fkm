<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>FKM ENERGY – Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <!-- Dashboard CSS -->
  <link rel="stylesheet" href="../css/dashboard.css">
</head>

<body>

<div class="app">

  <!-- SIDEBAR (chargée dynamiquement) -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <main class="main">

    <!-- TOPBAR -->
<button class="btn btn-outline-secondary btn-sm"
        id="toggleSidebar">
  <i class="bi bi-list"></i>
</button>


      <h1 class="page-title">Dashboard</h1>

      <div class="d-flex align-items-center gap-3">
        <div class="text-end">
          <div class="user-name" id="userName">—</div>
          <div class="user-role" id="userRole">—</div>
        </div>
        <button class="btn btn-outline-danger btn-sm" id="logoutBtn">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- KPI -->
    <div class="row g-3 mb-3">
      <div class="col-12 col-md-4">
        <div class="card kpi-card kpi-blue">
          <div class="card-body">
            <div class="kpi-label">Stock USD</div>
            <div class="kpi-value">—</div>
          </div>
        </div>
      </div>

      <div class="col-12 col-md-4">
        <div class="card kpi-card kpi-green">
          <div class="card-body">
            <div class="kpi-label">Stock CDF</div>
            <div class="kpi-value">—</div>
          </div>
        </div>
      </div>

      <div class="col-12 col-md-4">
        <div class="card kpi-card kpi-gold">
          <div class="card-body">
            <div class="kpi-label">Articles</div>
            <div class="kpi-value">—</div>
          </div>
        </div>
      </div>
    </div>

    <!-- GRAPH -->
    <div class="card">
      <div class="card-body">
        <strong>Historique de la valeur du stock</strong>
        <div class="chart-placeholder mt-3">
          Graphique (snapshots Firestore)
        </div>
      </div>
    </div>

  </main>
</div>

<!-- JS -->
<script type="module" src="../js/dashboard.js"></script>
<script src="../js/sidebar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
