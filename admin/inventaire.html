<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Inventaire | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Bootstrap CSS (nécessaire pour modal + d-none) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#0B5C6B",
            primaryDark: "#083F4A",
            success: "#2E7D32",
            warning: "#D4A017",
            danger: "#DC2626",
            bg: "#F5F7FA",
            muted: "#6B7280"
          }
        }
      }
    }
  </script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:Inter,system-ui}</style>

  <!-- Favicon fix -->
  <link rel="icon" href="data:,">
</head>

<body class="bg-bg text-slate-800">

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <main id="mainContent" class="flex-1 px-6 py-6 space-y-6 overflow-x-hidden">

    <!-- TOPBAR -->
    <div class="bg-white rounded-xl shadow-sm px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button id="toggleSidebar"
                class="p-2 rounded-lg border border-slate-200 hover:bg-slate-100 transition">
          <i class="bi bi-list"></i>
        </button>
        <div>
          <h1 class="text-lg font-semibold leading-tight">Inventaire</h1>
          <p class="text-xs text-muted">Gestion des produits et stocks</p>
        </div>
      </div>

      <div class="flex items-center gap-6">
        <div class="text-right">
          <div id="userName" class="font-semibold leading-tight">—</div>
          <div id="userRole" class="text-sm text-muted">—</div>
        </div>
        <button id="logoutBtn"
                class="px-4 py-2 rounded-lg border border-red-200 text-danger hover:bg-red-50 transition">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- HEADER ACTIONS -->
    <div class="flex items-center justify-between">
      <h2 class="font-semibold text-base">Liste des produits</h2>
      <button id="addProductBtn"
              class="d-none items-center gap-2 px-4 py-2 rounded-lg bg-success text-white hover:bg-green-700 transition">
        <i class="bi bi-plus-lg"></i>
        Nouveau produit
      </button>
    </div>

    <!-- TABLE -->
    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
          <thead class="bg-slate-50 border-b">
            <tr class="text-left text-slate-600">
              <th class="px-4 py-3">Produit</th>
              <th class="px-4 py-3">Catégorie</th>
              <th class="px-4 py-3">Qté</th>
              <th class="px-4 py-3">Stock min</th>
              <th class="px-4 py-3">Prix</th>
              <th class="px-4 py-3">Opérateur</th>
              <th class="px-4 py-3">Créé le</th>
              <th class="px-4 py-3">Statut</th>
              <th class="px-4 py-3 text-end">Actions</th>
            </tr>
          </thead>
          <tbody id="inventoryTable" class="divide-y"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!-- ✅ BOOTSTRAP MODAL (structure OFFICIELLE) -->
<div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content rounded-xl">

      <div class="modal-header">
        <h5 class="modal-title">Produit</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="productForm" class="row g-3">

          <div class="col-md-6">
            <label class="form-label">Nom</label>
            <input id="pName" class="form-control" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Catégorie</label>
            <input id="pCategory" class="form-control" required>
          </div>

          <div class="col-md-4">
            <label class="form-label">Quantité</label>
            <input id="pQty" type="number" min="0" class="form-control" required>
          </div>

          <div class="col-md-4">
            <label class="form-label">Stock minimum</label>
            <input id="pMinQty" type="number" min="0" value="0" class="form-control">
          </div>

          <div class="col-md-4">
            <label class="form-label">Devise</label>
            <select id="pCurrency" class="form-select">
              <option value="USD">USD</option>
              <option value="CDF">CDF</option>
              <option value="BOTH">USD & CDF</option>
            </select>
          </div>

          <div class="col-md-6" id="usdBlock">
            <label class="form-label">Prix USD</label>
            <input id="pUsd" type="number" min="0" class="form-control">
          </div>

          <div class="col-md-6 d-none" id="cdfBlock">
            <label class="form-label">Prix CDF</label>
            <input id="pCdf" type="number" min="0" class="form-control">
          </div>

        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button class="btn btn-success" id="saveProductBtn">Enregistrer</button>
      </div>

    </div>
  </div>
</div>

<!-- ✅ ORDRE DES SCRIPTS (CRITIQUE) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/sidebar.js"></script>
<script type="module" src="../js/inventaire.js"></script>

</body>
</html>
