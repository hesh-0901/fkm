<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#0B5C6B",
            primaryDark: "#083F4A",
            success: "#2E7D32",
            warning: "#D4A017",
            danger: "#DC2626",
            bg: "#F5F7FA",
            muted: "#6B7280"
          }
        }
      }
    }
  </script>

  <link rel="icon" href="data:,">
</head>

<body class="bg-bg text-slate-800">

<div class="flex min-h-screen">

  <!-- SIDEBAR (IDENTIQUE INVENTAIRE) -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <main id="mainContent" class="flex-1 px-6 py-6 space-y-6 overflow-x-hidden">

    <!-- TOPBAR (IDENTIQUE INVENTAIRE) -->
    <div class="bg-white rounded-xl shadow-sm px-6 py-4 flex items-center justify-between">

      <div class="flex items-center gap-3">
        <button id="toggleSidebar"
                class="p-2 rounded-lg border border-slate-200 hover:bg-slate-100 transition">
          <i class="bi bi-list"></i>
        </button>
        <div>
          <h1 class="text-lg font-semibold leading-tight">Dashboard</h1>
          <p class="text-xs text-muted">Vue d'ensemble du système</p>
        </div>
      </div>

      <div class="flex items-center gap-6">
        <div class="text-right">
          <div id="userName" class="font-semibold leading-tight">—</div>
          <div id="userRole" class="text-sm text-muted">—</div>
        </div>

        <button id="logoutBtn"
                class="px-4 py-2 rounded-lg border border-red-200 text-danger hover:bg-red-50 transition">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

   <!-- ================= KPI PREMIUM COLOR ================= -->
<div class="grid sm:grid-cols-2 xl:grid-cols-4 gap-6">

  <!-- PRODUITS -->
  <div class="relative bg-gradient-to-br from-indigo-500 via-primary to-primaryDark 
              text-white rounded-3xl shadow-2xl p-6 overflow-hidden 
              hover:scale-105 transition duration-300">

    <div class="absolute -right-8 -top-8 text-white/10 text-[120px]">
      <i class="bi bi-box-seam-fill"></i>
    </div>

    <div class="flex flex-col gap-2 relative z-10">
      <i class="bi bi-box text-4xl"></i>
      <p class="text-sm opacity-80">Produits enregistrés</p>
      <h2 id="totalProducts" class="text-4xl font-extrabold tracking-tight">0</h2>
    </div>
  </div>


  <!-- STOCK FAIBLE -->
  <div class="relative bg-gradient-to-br from-red-500 to-rose-700 
              text-white rounded-3xl shadow-2xl p-6 overflow-hidden
              hover:scale-105 transition duration-300">

    <div class="absolute -right-8 -top-8 text-white/10 text-[120px]">
      <i class="bi bi-exclamation-diamond-fill"></i>
    </div>

    <div class="flex flex-col gap-2 relative z-10">
      <i class="bi bi-graph-down-arrow text-4xl"></i>
      <p class="text-sm opacity-80">Stock critique</p>
      <h2 id="lowStock" class="text-4xl font-extrabold">0</h2>
    </div>
  </div>


  <!-- PENDING -->
  <div class="relative bg-gradient-to-br from-amber-400 via-orange-500 to-amber-600
              text-white rounded-3xl shadow-2xl p-6 overflow-hidden
              hover:scale-105 transition duration-300">

    <div class="absolute -right-8 -top-8 text-white/10 text-[120px]">
      <i class="bi bi-hourglass-split"></i>
    </div>

    <div class="flex flex-col gap-2 relative z-10">
      <i class="bi bi-clock-history text-4xl"></i>
      <p class="text-sm opacity-90">Transactions Pending</p>
      <h2 id="pendingTx" class="text-4xl font-extrabold">0</h2>
    </div>
  </div>


  <!-- APPROUVÉES -->
  <div class="relative bg-gradient-to-br from-emerald-500 via-green-600 to-emerald-700
              text-white rounded-3xl shadow-2xl p-6 overflow-hidden
              hover:scale-105 transition duration-300">

    <div class="absolute -right-8 -top-8 text-white/10 text-[120px]">
      <i class="bi bi-check-circle-fill"></i>
    </div>

    <div class="flex flex-col gap-2 relative z-10">
      <i class="bi bi-currency-dollar text-4xl"></i>
      <p class="text-sm opacity-90">Ventes approuvées</p>
      <h2 id="approvedTx" class="text-4xl font-extrabold">0</h2>
    </div>
  </div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/sidebar.js"></script>
<script type="module" src="../js/dashboard.js"></script>

</body>
</html>
