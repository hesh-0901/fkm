<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Inventaire | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="icon" href="data:,">
</head>

<body class="bg-gray-50 text-slate-800">

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <main class="flex-1 px-6 py-6 space-y-6">

    <!-- HEADER -->
    <div class="bg-white rounded-xl shadow-sm px-6 py-4 flex items-center justify-between">

      <div class="flex items-center gap-3">
        <button id="toggleSidebar"
                class="p-2 rounded-lg border hover:bg-gray-100">
          <i class="bi bi-list"></i>
        </button>

        <div>
          <h1 class="text-lg font-semibold">Inventaire</h1>
          <p class="text-xs text-gray-500">Gestion des produits</p>
        </div>
      </div>

      <div class="flex items-center gap-6">
        <div class="text-right">
          <div id="userName" class="font-semibold text-sm">—</div>
          <div id="userRole" class="text-xs text-gray-500">—</div>
        </div>

        <button id="logoutBtn"
                class="px-4 py-2 rounded-lg border border-red-200 text-red-600 hover:bg-red-50">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>

    </div>

    <!-- ACTION BAR -->
    <div class="flex justify-between items-center">
      <h2 class="text-sm font-semibold text-gray-600">Liste des articles</h2>

      <button id="addProductBtn"
              class="d-none px-4 py-2 text-sm bg-green-600 text-white rounded-lg hover:bg-green-700">
        <i class="bi bi-plus-lg"></i>
        Nouveau produit
      </button>
    </div>

    <!-- TABLE -->
    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
          <thead class="bg-gray-50 border-b text-xs uppercase text-gray-500">
            <tr>
              <th class="px-3 py-3">#</th>
              <th class="px-3 py-3">Produit</th>
              <th class="px-3 py-3">Catégorie</th>
              <th class="px-3 py-3">Stock</th>
              <th class="px-3 py-3">Min</th>
              <th class="px-3 py-3">Prix</th>
              <th class="px-3 py-3">Statut</th>
              <th class="px-3 py-3 text-end">Actions</th>
            </tr>
          </thead>
          <tbody id="inventoryTable" class="divide-y"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!-- MODAL -->
<div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content rounded-xl">

      <div class="modal-header">
        <h5 class="modal-title">Produit</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="productForm" class="row g-3">

          <div class="col-md-6">
            <label class="form-label">Nom</label>
            <input id="pName" class="form-control" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Catégorie</label>
            <input id="pCategory" class="form-control" required>
          </div>

          <div class="col-md-4">
            <label class="form-label">Stock</label>
            <input id="pQty" type="number" class="form-control" required>
          </div>

          <div class="col-md-4">
            <label class="form-label">Stock minimum</label>
            <input id="pMinQty" type="number" class="form-control">
          </div>

          <div class="col-md-4">
            <label class="form-label">Devise</label>
            <select id="pCurrency" class="form-select">
              <option value="USD">USD</option>
              <option value="CDF">CDF</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Prix USD</label>
            <input id="pUsd" type="number" class="form-control">
          </div>

          <div class="col-md-6">
            <label class="form-label">Prix CDF</label>
            <input id="pCdf" type="number" class="form-control">
          </div>

        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button class="btn btn-success" id="saveProductBtn">Enregistrer</button>
      </div>

    </div>
  </div>
</div>

<!-- SCRIPTS (ORDRE IMPORTANT) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/sidebar.js"></script>
<script type="module" src="../js/inventaire.js"></script>

</body>
</html>
