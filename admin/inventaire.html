<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Inventaire | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#0B5C6B",
            primaryDark: "#083F4A",
            success: "#2E7D32",
            warning: "#D4A017",
            danger: "#DC2626",
            bg: "#F5F7FA",
            muted: "#6B7280"
          }
        }
      }
    }
  </script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:Inter,system-ui}</style>
</head>

<body class="bg-bg text-slate-800">

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <main id="mainContent" class="flex-1 px-6 py-6 space-y-6 overflow-x-hidden">

    <!-- TOPBAR -->
    <div class="bg-white rounded-xl shadow-sm px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button id="toggleSidebar"
                class="p-2 rounded-lg border border-slate-200 hover:bg-slate-100 transition">
          <i class="bi bi-list"></i>
        </button>
        <div>
          <h1 class="text-lg font-semibold leading-tight">Inventaire</h1>
          <p class="text-xs text-muted">Gestion des produits et stocks</p>
        </div>
      </div>

      <div class="flex items-center gap-6">
        <div class="text-right">
          <div id="userName" class="font-semibold leading-tight">—</div>
          <div id="userRole" class="text-sm text-muted">—</div>
        </div>
        <button id="logoutBtn"
                class="px-4 py-2 rounded-lg border border-red-200 text-danger hover:bg-red-50 transition">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- HEADER ACTIONS -->
    <div class="flex items-center justify-between">
      <h2 class="font-semibold text-base">Liste des produits</h2>
      <button id="addProductBtn"
              class="hidden items-center gap-2 px-4 py-2 rounded-lg bg-success text-white hover:bg-green-700 transition">
        <i class="bi bi-plus-lg"></i>
        Nouveau produit
      </button>
    </div>

    <!-- TABLE -->
    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
          <thead class="bg-slate-50 border-b">
            <tr class="text-left text-slate-600">
              <th class="px-4 py-3 font-medium">Produit</th>
              <th class="px-4 py-3 font-medium">Catégorie</th>
              <th class="px-4 py-3 font-medium">Qté</th>
              <th class="px-4 py-3 font-medium">Stock min</th>
              <th class="px-4 py-3 font-medium">Prix</th>
              <th class="px-4 py-3 font-medium">Opérateur</th>
              <th class="px-4 py-3 font-medium">Créé le</th>
              <th class="px-4 py-3 font-medium">Statut</th>
              <th class="px-4 py-3 text-right font-medium">Actions</th>
            </tr>
          </thead>
          <tbody id="inventoryTable" class="divide-y"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!-- MODAL -->
<div id="productModal"
     class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">

  <div class="bg-white rounded-xl shadow-lg w-full max-w-2xl">

    <!-- HEADER -->
    <div class="px-6 py-4 border-b flex items-center justify-between">
      <h3 class="font-semibold">Produit</h3>
      <button data-close class="text-slate-400 hover:text-slate-700">
        ✕
      </button>
    </div>

    <!-- BODY -->
    <div class="p-6">
      <form id="productForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <div>
          <label class="text-sm font-medium">Nom</label>
          <input id="pName" class="mt-1 w-full rounded-lg border px-3 py-2" required>
        </div>

        <div>
          <label class="text-sm font-medium">Catégorie</label>
          <input id="pCategory" class="mt-1 w-full rounded-lg border px-3 py-2" required>
        </div>

        <div>
          <label class="text-sm font-medium">Quantité</label>
          <input id="pQty" type="number" min="0"
                 class="mt-1 w-full rounded-lg border px-3 py-2" required>
        </div>

        <div>
          <label class="text-sm font-medium">Stock minimum</label>
          <input id="pMinQty" type="number" min="0" value="0"
                 class="mt-1 w-full rounded-lg border px-3 py-2">
        </div>

        <div>
          <label class="text-sm font-medium">Devise</label>
          <select id="pCurrency" class="mt-1 w-full rounded-lg border px-3 py-2">
            <option value="USD">USD</option>
            <option value="CDF">CDF</option>
            <option value="BOTH">USD & CDF</option>
          </select>
        </div>

        <div id="usdBlock">
          <label class="text-sm font-medium">Prix USD</label>
          <input id="pUsd" type="number" min="0"
                 class="mt-1 w-full rounded-lg border px-3 py-2">
        </div>

        <div id="cdfBlock" class="hidden">
          <label class="text-sm font-medium">Prix CDF</label>
          <input id="pCdf" type="number" min="0"
                 class="mt-1 w-full rounded-lg border px-3 py-2">
        </div>

      </form>
    </div>

    <!-- FOOTER -->
    <div class="px-6 py-4 border-t flex justify-end gap-3">
      <button data-close
              class="px-4 py-2 rounded-lg border hover:bg-slate-100">
        Annuler
      </button>
      <button id="saveProductBtn"
              class="px-4 py-2 rounded-lg bg-success text-white hover:bg-green-700">
        Enregistrer
      </button>
    </div>

  </div>
</div>

<script type="module" src="../js/inventaire.js"></script>
<script src="../js/sidebar.js"></script>
</body>
</html>
