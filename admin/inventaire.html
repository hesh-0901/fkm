<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Inventaire | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>

<body>
<div class="app">

  <div id="sidebar-container"></div>

  <main class="main">

    <div class="topbar">
      <button class="btn btn-outline-secondary btn-sm" id="toggleSidebar">
        <i class="bi bi-list"></i>
      </button>

      <h1 class="page-title">Inventaire</h1>

      <div class="d-flex align-items-center gap-3">
        <div class="text-end">
          <div class="user-name" id="userName">—</div>
          <div class="user-role" id="userRole">—</div>
        </div>
        <button class="btn btn-outline-danger btn-sm" id="logoutBtn">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
      <strong>Liste des produits</strong>
      <button class="btn btn-success btn-sm d-none" id="addProductBtn">
        <i class="bi bi-plus-lg"></i> Nouveau produit
      </button>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>Produit</th>
            <th>Catégorie</th>
            <th>Qté</th>
            <th>Stock min</th>
            <th>Prix</th>
            <th>Statut</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody id="inventoryTable"></tbody>
      </table>
    </div>

  </main>
</div>

<!-- MODAL -->
<div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Produit</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="productForm" class="row g-3">

          <div class="col-md-6">
            <label class="form-label">Nom</label>
            <input id="pName" class="form-control" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Catégorie</label>
            <input id="pCategory" class="form-control" required>
          </div>

          <div class="col-md-4">
            <label class="form-label">Quantité</label>
            <input id="pQty" type="number" min="0" class="form-control" required>
          </div>

          <div class="col-md-4">
            <label class="form-label">Stock minimum</label>
            <input id="pMinQty" type="number" min="0" value="0" class="form-control">
          </div>

          <div class="col-md-4">
            <label class="form-label">Devise</label>
            <select id="pCurrency" class="form-select">
              <option value="USD">USD</option>
              <option value="CDF">CDF</option>
              <option value="BOTH">USD & CDF</option>
            </select>
          </div>

          <div class="col-md-6" id="usdBlock">
            <label class="form-label">Prix USD</label>
            <input id="pUsd" type="number" min="0" class="form-control">
          </div>

          <div class="col-md-6 d-none" id="cdfBlock">
            <label class="form-label">Prix CDF</label>
            <input id="pCdf" type="number" min="0" class="form-control">
          </div>

        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button class="btn btn-success" id="saveProductBtn">Enregistrer</button>
      </div>

    </div>
  </div>
</div>

<script type="module" src="../js/inventaire.js"></script>
<script src="../js/sidebar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
