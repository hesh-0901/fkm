<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ventes | FKM ENERGY</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<link rel="icon" href="data:,">
<style>
body{font-family:Inter,system-ui}
</style>
</head>

<body class="bg-slate-100 text-slate-800">

<div class="flex min-h-screen">

<div id="sidebar-container"></div>

<main class="flex-1 p-6 space-y-6">

<!-- HEADER -->
<div class="bg-white rounded-xl shadow-sm px-6 py-4 flex justify-between items-center">
  <div>
    <h1 class="text-base font-semibold">Module Ventes</h1>
    <p class="text-xs text-slate-500">Transactions commerciales</p>
  </div>
  <button id="newTxBtn"
    class="px-4 py-2 text-sm bg-emerald-600 text-white rounded-lg hover:bg-emerald-700">
    <i class="bi bi-plus-lg"></i>
  </button>
</div>

<!-- TABLE ERP -->
<div class="bg-white rounded-xl shadow-sm overflow-hidden">
<div class="overflow-x-auto">
<table class="min-w-full text-xs">
<thead class="bg-slate-50 border-b uppercase tracking-wider text-slate-500">
<tr>
<th class="px-4 py-3">N°</th>
<th class="px-4 py-3">Date</th>
<th class="px-4 py-3">Client</th>
<th class="px-4 py-3">Produit</th>
<th class="px-4 py-3 text-right">Qté</th>
<th class="px-4 py-3 text-right">Total</th>
<th class="px-4 py-3">Statut</th>
<th class="px-4 py-3 text-right">Actions</th>
</tr>
</thead>
<tbody id="txTable" class="divide-y text-slate-700"></tbody>
</table>
</div>
</div>

</main>
</div>

<!-- MODAL -->
<div class="modal fade" id="txModal" tabindex="-1">
<div class="modal-dialog modal-lg modal-dialog-centered">
<div class="modal-content rounded-4">

<div class="modal-header border-0">
<h5 class="modal-title text-sm font-semibold">Nouvelle vente</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
<form id="txForm" class="space-y-4 text-sm">

<div>
<label class="block text-xs mb-1">Produit</label>
<select id="txProduct" class="form-select form-select-sm"></select>
</div>

<div>
<label class="block text-xs mb-1">Client</label>
<input id="partnerSearch" class="form-control form-control-sm"
placeholder="Rechercher ou saisir le nom">
</div>

<div>
<label class="block text-xs mb-1">Quantité</label>
<input type="number" id="txQty" min="1"
class="form-control form-control-sm">
</div>

<div class="bg-slate-50 p-3 rounded-lg text-xs space-y-1">
<div>Prix unitaire : <span id="unitPrice">—</span></div>
<div>Devise : <span id="currency">—</span></div>
<div class="font-semibold">Total : <span id="totalPrice">—</span></div>
</div>

</form>
</div>

<div class="modal-footer border-0">
<button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Annuler</button>
<button id="saveTxBtn" class="btn btn-success btn-sm">Enregistrer</button>
</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/sidebar.js"></script>
<script type="module" src="../js/transactions.js"></script>

</body>
</html>
