<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Transactions | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#0B5C6B",
            primaryDark: "#083F4A",
            success: "#2E7D32",
            warning: "#D4A017",
            danger: "#DC2626",
            bg: "#F5F7FA",
            muted: "#6B7280"
          }
        }
      }
    }
  </script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:Inter,system-ui}</style>

  <link rel="icon" href="data:,">
</head>

<body class="bg-bg text-slate-800">

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <main id="mainContent" class="flex-1 px-6 py-6 space-y-6 overflow-x-hidden">

    <!-- ================= TOPBAR IDENTIQUE INVENTAIRE ================= -->
    <div class="bg-white rounded-xl shadow-sm px-6 py-4 flex items-center justify-between">

      <div class="flex items-center gap-3">
        <button id="toggleSidebar"
                class="p-2 rounded-lg border border-slate-200 hover:bg-slate-100 transition">
          <i class="bi bi-list"></i>
        </button>

        <div>
          <h1 class="text-lg font-semibold leading-tight">Transactions</h1>
          <p class="text-xs text-muted">Ventes & gestion commerciale</p>
        </div>
      </div>

      <div class="flex items-center gap-6">
        <div class="text-right">
          <div id="userName" class="font-semibold leading-tight">—</div>
          <div id="userFunction" class="text-sm text-muted">—</div>
        </div>

        <button id="logoutBtn"
                class="px-4 py-2 rounded-lg border border-red-200 text-danger hover:bg-red-50 transition">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

<!-- ================= HEADER ACTIONS ================= -->
<div class="flex flex-col gap-4">

  <!-- Ligne 1 : Titre + bouton -->
  <div class="flex items-center justify-between">
    <div>
      <h2 class="text-lg font-semibold">Liste des transactions</h2>
      <p class="text-xs text-muted">Recherche & filtres avancés</p>
    </div>

    <button id="newTxBtn"
      class="d-none flex items-center gap-2 px-5 py-2.5 rounded-xl 
             bg-gradient-to-r from-success to-emerald-600 
             text-white shadow-md hover:scale-105 transition">
      <i class="bi bi-plus-lg text-lg"></i>
      Nouvelle transaction
    </button>
  </div>

  <!-- Ligne 2 : Recherche + Filtres -->
  <div class="flex flex-wrap items-center gap-4">

    <!-- Recherche -->
    <input id="txSearch"
      placeholder="Rechercher facture, client, produit..."
      class="px-4 py-2 rounded-xl border border-slate-200 
             focus:ring-2 focus:ring-primary focus:outline-none text-sm w-72">

    <!-- Filtre statut -->
    <select id="statusFilter"
      class="px-4 py-2 rounded-xl border border-slate-200 text-sm">
      <option value="ALL">Tous statuts</option>
      <option value="PENDING">En attente</option>
      <option value="APPROVED">Approuvées</option>
      <option value="REJECTED">Rejetées</option>
    </select>

    <!-- Filtres rapides -->
    <select id="quickDateFilter"
      class="px-4 py-2 rounded-xl border border-slate-200 text-sm">
      <option value="ALL">Toutes dates</option>
      <option value="TODAY">Aujourd’hui</option>
      <option value="7DAYS">7 derniers jours</option>
      <option value="30DAYS">30 derniers jours</option>
    </select>

    <!-- Plage personnalisée -->
    <input type="date" id="startDate"
      class="px-3 py-2 rounded-xl border border-slate-200 text-sm">

    <input type="date" id="endDate"
      class="px-3 py-2 rounded-xl border border-slate-200 text-sm">

    <!-- Reset -->
    <button id="resetFilters"
      class="px-4 py-2 rounded-xl border border-slate-200 text-sm hover:bg-slate-100 transition">
      Reset
    </button>

  </div>
</div>


<!-- ================= TABLE ================= -->
<div class="bg-white rounded-2xl shadow-md border border-slate-100 overflow-hidden">

  <div class="overflow-x-auto">

    <table class="min-w-full text-sm">

      <thead class="bg-slate-50 border-b text-xs uppercase tracking-wide text-slate-500">
        <tr>
          <th class="px-6 py-4">#</th>
          <th class="px-6 py-4">Facture</th>
          <th class="px-6 py-4">Date</th>
          <th class="px-6 py-4">Client</th>
          <th class="px-6 py-4">Numéro du client</th>
          <th class="px-6 py-4">Produit</th>
          <th class="px-6 py-4 text-center">Qté</th>
          <th class="px-6 py-4">Total</th>
          <th class="px-6 py-4">Statut</th>
          <th class="px-6 py-4 text-end">Actions</th>
        </tr>
      </thead>

      <tbody id="txTable" class="divide-y divide-slate-100">
      </tbody>

    </table>

  </div>
</div>


  </main>
</div>

<!-- ================= MODAL ================= -->
<!-- ================= ERP MODAL ================= -->
<div class="modal fade" id="txModal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content rounded-xl">

      <div class="modal-header">
        <h5 class="modal-title">
          <i class="bi bi-receipt me-2"></i>
          Transaction ERP
        </h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body space-y-6">

        <!-- ===== INFORMATIONS GENERALES ===== -->
        <div class="grid grid-cols-3 gap-4">

          <div>
            <label class="form-label">Client</label>
            <input id="partnerSearch" class="form-control">
          </div>

          <div>
            <label class="form-label">Marketeur</label>
            <input id="marketerSearch" class="form-control"
                   placeholder="Initiales...">
            <div id="marketerResults"
                 class="list-group mt-1"
                 style="max-height:150px;overflow-y:auto"></div>
          </div>

          <div>
            <label class="form-label">Remise (%)</label>
            <input id="discountPercent"
                   type="number"
                   min="0"
                   max="100"
                   value="0"
                   class="form-control">
          </div>
            <div>
                <label class="form-label">Devise Facture</label>
                <select id="invoiceCurrency" class="form-select">
                  <option value="USD">USD</option>
                  <option value="CDF">CDF</option>
                </select>
              </div>
        </div>

        <!-- ===== PRODUITS ===== -->
        <div class="border rounded-xl p-4 space-y-4">

          <div class="grid grid-cols-4 gap-4">

            <div>
              <label class="form-label">Produit</label>
              <input id="productSearch"
                     class="form-control"
                     placeholder="Rechercher...">
              <div id="productResults"
                   class="list-group mt-1"
                   style="max-height:150px;overflow-y:auto"></div>
            </div>

            <div>
              <label class="form-label">Quantité</label>
              <input id="txQty"
                     type="number"
                     min="1"
                     class="form-control">
            </div>

            <div>
              <label class="form-label">Stock dispo</label>
              <input id="stockInfo"
                     class="form-control"
                     readonly>
            </div>

            <div class="flex items-end">
              <button id="addItemBtn"
                      class="btn btn-primary w-full">
                Ajouter
              </button>
            </div>

          </div>

          <!-- TABLE ITEMS -->
          <div class="overflow-x-auto">
            <table class="table table-sm">
              <thead>
                <tr>
                  <th>Produit</th>
                  <th>Qté</th>
                  <th>PU USD</th>
                  <th>Total USD</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="itemsTable"></tbody>
            </table>
          </div>

        </div>

        <!-- ===== TOTALS ===== -->
        <div class="flex justify-end">
          <div class="w-1/3 space-y-2">

            <div class="flex justify-between">
              <span>Subtotal</span>
              <span id="subtotalUSD">0 USD</span>
            </div>

            <div class="flex justify-between">
              <span>Remise</span>
              <span id="discountAmountUSD">0 USD</span>
            </div>

            <div class="flex justify-between font-semibold text-lg">
              <span>Total Final</span>
              <span id="grandTotalUSD">0 USD</span>
            </div>

          </div>
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">
          Annuler
        </button>
        <button class="btn btn-success" id="saveTxBtn">
          Enregistrer
        </button>
      </div>

    </div>
  </div>
</div>


<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/sidebar.js"></script>
<script type="module" src="../js/transactions.js"></script>

</body>
</html>
