<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Transactions | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#0B5C6B",
            primaryDark: "#083F4A",
            success: "#2E7D32",
            warning: "#D4A017",
            danger: "#DC2626",
            bg: "#F5F7FA",
            muted: "#6B7280"
          }
        }
      }
    }
  </script>

  <link rel="icon" href="data:,">
</head>

<body class="bg-bg text-slate-800">

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <main id="mainContent" class="flex-1 px-6 py-6 space-y-6 overflow-x-hidden">

    <!-- TOPBAR -->
    <div class="bg-white rounded-xl shadow-sm px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button id="toggleSidebar"
                class="p-2 rounded-lg border border-slate-200 hover:bg-slate-100 transition">
          <i class="bi bi-list"></i>
        </button>
        <div>
          <h1 class="text-lg font-semibold leading-tight">Transactions</h1>
          <p class="text-xs text-muted">Ventes & gestion commerciale</p>
        </div>
      </div>

      <button id="newTxBtn"
              class="d-none items-center gap-2 px-4 py-2 rounded-lg bg-success text-white hover:bg-green-700 transition">
        <i class="bi bi-plus-lg"></i>
        Nouvelle vente
      </button>
    </div>

    <!-- TABLE -->
    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
          <thead class="bg-slate-50 border-b">
<thead class="bg-slate-50 border-b">
  <tr class="text-left text-slate-600">
    <th class="px-4 py-3">Facture</th>
    <th class="px-4 py-3">Date</th>
    <th class="px-4 py-3">Client</th>
    <th class="px-4 py-3">Produit</th>
    <th class="px-4 py-3">Qté</th>
    <th class="px-4 py-3">Total</th>
    <th class="px-4 py-3">Statut</th>
    <th class="px-4 py-3 text-end">Actions</th>
  </tr>
</thead>

          </thead>
          <tbody id="txTable" class="divide-y"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!-- ================= MODAL PROFESSIONNEL ================= -->
<div class="modal fade" id="txModal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content rounded-xl">

      <div class="modal-header">
        <h5 class="modal-title">
          <i class="bi bi-receipt me-2"></i>
          Transaction commerciale
        </h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="txForm" class="row g-3">

          <!-- PRODUIT -->
          <div class="col-md-6">
            <label class="form-label">Produit</label>
            <input type="text"
                   id="productSearch"
                   class="form-control"
                   placeholder="Rechercher un produit...">
            <div id="productResults"
                 class="list-group mt-1"
                 style="max-height:200px;overflow-y:auto"></div>
          </div>

          <!-- CLIENT -->
          <div class="col-md-6">
            <label class="form-label">Client</label>
            <input type="text"
                   id="partnerSearch"
                   class="form-control"
                   placeholder="Rechercher ou saisir le nom">
            <div id="partnerResults"
                 class="list-group mt-1"
                 style="max-height:200px;overflow-y:auto"></div>
          </div>

          <!-- QUANTITE -->
          <div class="col-md-4">
            <label class="form-label">Quantité</label>
            <input id="txQty"
                   type="number"
                   min="1"
                   class="form-control">
          </div>

          <!-- PRIX -->
          <div class="col-md-4">
            <label class="form-label">Prix unitaire</label>
            <input id="unitPrice"
                   class="form-control"
                   readonly>
          </div>

          <!-- TOTAL -->
          <div class="col-md-4">
            <label class="form-label">Total</label>
            <input id="totalPrice"
                   class="form-control fw-bold"
                   readonly>
          </div>

        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">
          Annuler
        </button>
        <button class="btn btn-success" id="saveTxBtn">
          Enregistrer
        </button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/sidebar.js"></script>
<script type="module" src="../js/transactions.js"></script>

</body>
</html>
