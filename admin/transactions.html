<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Transactions | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <link rel="stylesheet" href="../css/dashboard.css">
</head>

<body>
<div class="app">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <main class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <button class="btn btn-outline-secondary btn-sm" id="toggleSidebar">
        <i class="bi bi-list"></i>
      </button>

      <h1 class="page-title">Transactions</h1>

      <div class="d-flex align-items-center gap-3">
        <div class="text-end">
          <div class="user-name" id="userName">—</div>
          <div class="user-role" id="userRole">—</div>
        </div>
        <button class="btn btn-outline-danger btn-sm" id="logoutBtn">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- ACTION BAR -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <strong>Historique des transactions</strong>
      <button class="btn btn-success btn-sm d-none" id="newTxBtn">
        <i class="bi bi-plus-lg"></i> Nouvelle transaction
      </button>
    </div>

    <!-- TABLE -->
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>Date</th>
            <th>Produit</th>
            <th>Type</th>
            <th>Qté</th>
            <th>Statut</th>
            <th>Opérateur</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="txTable"></tbody>
      </table>
    </div>

  </main>
</div>

<!-- MODAL : NOUVELLE TRANSACTION -->
<div class="modal fade" id="txModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Nouvelle transaction</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
<form id="txForm">

  <div class="mb-3">
    <label class="form-label">Produit</label>
    <select class="form-select" id="txProduct" required></select>
  </div>

  <div class="mb-3">
    <label class="form-label">Type</label>
    <select class="form-select" id="txType">
      <option value="out">Sortie (Client)</option>
      <option value="in">Entrée (Fournisseur)</option>
    </select>
  </div>

  <!-- CLIENT -->
  <div class="mb-3" id="clientBlock">
    <label class="form-label">Client</label>
    <select class="form-select" id="txClient"></select>
  </div>

  <!-- FOURNISSEUR -->
  <div class="mb-3 d-none" id="supplierBlock">
    <label class="form-label">Fournisseur</label>
    <select class="form-select" id="txSupplier"></select>
  </div>

  <div class="mb-3">
    <label class="form-label">Quantité</label>
    <input type="number" class="form-control" id="txQty" min="1" required>
  </div>

</form>

      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button class="btn btn-success" id="saveTxBtn">Enregistrer</button>
      </div>

    </div>
  </div>
</div>

<script type="module" src="../js/transactions.js"></script>
<script src="../js/sidebar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
