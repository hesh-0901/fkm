<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Transactions | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Bootstrap CSS (modal, list-group, d-none) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#0B5C6B",
            primaryDark: "#083F4A",
            success: "#2E7D32",
            warning: "#D4A017",
            danger: "#DC2626",
            bg: "#F5F7FA",
            muted: "#6B7280"
          }
        }
      }
    }
  </script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:Inter,system-ui}</style>

  <!-- Favicon fix -->
  <link rel="icon" href="data:,">
</head>

<body class="bg-bg text-slate-800">

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <main id="mainContent" class="flex-1 px-6 py-6 space-y-6 overflow-x-hidden">

    <!-- TOPBAR -->
    <div class="bg-white rounded-xl shadow-sm px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button id="toggleSidebar"
                class="p-2 rounded-lg border border-slate-200 hover:bg-slate-100 transition">
          <i class="bi bi-list"></i>
        </button>
        <div>
          <h1 class="text-lg font-semibold leading-tight">Transactions</h1>
          <p class="text-xs text-muted">Historique des entrées et sorties</p>
        </div>
      </div>

      <div class="flex items-center gap-6">
        <div class="text-right">
          <div id="userName" class="font-semibold leading-tight">—</div>
          <div id="userRole" class="text-sm text-muted">—</div>
        </div>
        <button id="logoutBtn"
                class="px-4 py-2 rounded-lg border border-red-200 text-danger hover:bg-red-50 transition">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- HEADER ACTIONS -->
    <div class="flex items-center justify-between">
      <h2 class="font-semibold text-base">Historique des transactions</h2>
      <button id="newTxBtn"
              class="d-none items-center gap-2 px-4 py-2 rounded-lg bg-success text-white hover:bg-green-700 transition">
        <i class="bi bi-plus-lg"></i>
        Nouvelle transaction
      </button>
    </div>

    <!-- TABLE -->
    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
          <thead class="bg-slate-50 border-b">
            <tr class="text-left text-slate-600">
              <th class="px-4 py-3">Date</th>
              <th class="px-4 py-3">Produit</th>
              <th class="px-4 py-3">Type</th>
              <th class="px-4 py-3">Qté</th>
              <th class="px-4 py-3">Client / Fournisseur</th>
              <th class="px-4 py-3">Statut</th>
              <th class="px-4 py-3">Opérateur</th>
              <th class="px-4 py-3 text-end">Actions</th>
            </tr>
          </thead>
          <tbody id="txTable" class="divide-y"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!-- ✅ MODAL TRANSACTION (BOOTSTRAP OFFICIEL) -->
<div class="modal fade" id="txModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-xl">

      <div class="modal-header">
        <h5 class="modal-title">Nouvelle transaction</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="txForm">

          <div class="mb-3">
            <label class="form-label">Produit</label>
            <select class="form-select" id="txProduct"></select>
          </div>

          <div class="mb-3">
            <label class="form-label">Type</label>
            <select class="form-select" id="txType">
              <option value="out">Sortie (Client)</option>
              <option value="in">Entrée (Fournisseur)</option>
            </select>
          </div>

          <div class="mb-2">
            <input type="text"
                   class="form-control"
                   id="partnerSearch"
                   placeholder="Rechercher client ou fournisseur…">
          </div>

          <div class="list-group mb-2"
               id="partnerList"
               style="max-height:200px;overflow-y:auto"></div>

          <input type="hidden" id="partnerId">
          <input type="hidden" id="partnerName">

          <div class="mb-3 mt-3">
            <label class="form-label">Quantité</label>
            <input type="number"
                   class="form-control"
                   id="txQty"
                   min="1"
                   required>
          </div>

        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button class="btn btn-success" id="saveTxBtn">Enregistrer</button>
      </div>

    </div>
  </div>
</div>

<!-- ✅ ORDRE DES SCRIPTS (CRITIQUE) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/sidebar.js"></script>
<script type="module" src="../js/transactions.js"></script>

</body>
</html>
