<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>FKM ENERGY – Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  />

  <!-- Main CSS -->
  <link rel="stylesheet" href="css/main.css" />
</head>

<body>
  <div class="container-fluid">
    <div class="row">

      <aside class="col-md-3 col-lg-2 sidebar p-3">
        <h5 class="text-white mb-4">FKM ENERGY</h5>

        <ul class="nav flex-column gap-1">
          <li class="nav-item">
            <a class="nav-link active" href="index.html">
              <i class="bi bi-speedometer2"></i> Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="pages/inventaire.html">
              <i class="bi bi-box-seam"></i> Inventaire
            </a>
          </li>
        </ul>
      </aside>

      <main class="col-md-9 col-lg-10 px-4 py-4">
        <h2 class="h4 mb-3">Dashboard</h2>

        <div class="row g-3 mb-4">
          <div class="col-md-4">
            <div class="card kpi-card shadow-sm">
              <div class="card-body">
                <div class="kpi-label">Valeur du stock (USD)</div>
                <div class="kpi-value">—</div>
              </div>
            </div>
          </div>
        </div>

        <div class="card shadow-sm border-0">
          <div class="card-body">
            <strong>Historique du stock</strong>
            <div class="chart-placeholder mt-3">
              Graphique figé Firestore
            </div>
          </div>
        </div>
      </main>

    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
