<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>FKM ENERGY – Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      background-color: #f5f6f8;
    }
    .sidebar {
      min-height: 100vh;
      background-color: #0d1b2a;
    }
    .sidebar .nav-link {
      color: #cfd8dc;
    }
    .sidebar .nav-link.active {
      background-color: #1b263b;
      color: #ffffff;
      border-radius: 0.375rem;
    }
    .card-value {
      font-size: 1.5rem;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="container-fluid">
    <div class="row">

      <!-- SIDEBAR -->
      <nav class="col-md-3 col-lg-2 d-md-block sidebar p-3">
        <h5 class="text-white mb-4">FKM ENERGY</h5>
        <ul class="nav flex-column gap-1">
          <li class="nav-item">
            <a class="nav-link active" href="#">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Inventaire</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Transactions</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Clients</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Fournisseurs</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Taux & Devises</a>
          </li>
        </ul>
      </nav>

      <!-- MAIN -->
      <main class="col-md-9 col-lg-10 ms-sm-auto px-4 py-4">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="h4 mb-0">Dashboard</h2>
          <span class="text-muted">Vue financière du stock</span>
        </div>

        <!-- STATS -->
        <div class="row g-3 mb-4">
          <div class="col-md-4">
            <div class="card shadow-sm">
              <div class="card-body">
                <div class="text-muted">Valeur du stock (USD)</div>
                <div class="card-value">—</div>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card shadow-sm">
              <div class="card-body">
                <div class="text-muted">Valeur du stock (CDF)</div>
                <div class="card-value">—</div>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card shadow-sm">
              <div class="card-body">
                <div class="text-muted">Articles en stock</div>
                <div class="card-value">—</div>
              </div>
            </div>
          </div>
        </div>

        <!-- GRAPH PLACEHOLDER -->
        <div class="card shadow-sm">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <strong>Historique de la valeur du stock</strong>
              <div class="btn-group btn-group-sm">
                <button class="btn btn-outline-secondary">Mensuel</button>
                <button class="btn btn-outline-secondary">Hebdomadaire</button>
              </div>
            </div>

            <div
              class="d-flex align-items-center justify-content-center text-muted"
              style="height: 260px; border: 1px dashed #ced4da;"
            >
              Graphique (données figées Firestore)
            </div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  ></script>
</body>
</html>
