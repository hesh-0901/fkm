<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>FKM ENERGY – Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  />

  <style>
    body {
      background-color: #f4f6f9;
      font-size: 0.95rem;
    }

    /* Sidebar */
    .sidebar {
      min-height: 100vh;
      background: linear-gradient(180deg, #0d1b2a, #1b263b);
    }
    .sidebar h5 {
      letter-spacing: 0.08em;
      font-size: 0.9rem;
    }
    .sidebar .nav-link {
      color: #cfd8dc;
      padding: 0.6rem 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      border-radius: 0.375rem;
    }
    .sidebar .nav-link:hover {
      background-color: rgba(255,255,255,0.08);
    }
    .sidebar .nav-link.active {
      background-color: #415a77;
      color: #ffffff;
      font-weight: 500;
    }

    /* Cards */
    .kpi-card {
      border: none;
      border-radius: 0.75rem;
    }
    .kpi-label {
      color: #6c757d;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .kpi-value {
      font-size: 1.6rem;
      font-weight: 600;
    }

    /* Chart placeholder */
    .chart-placeholder {
      height: 300px;
      border: 2px dashed #dee2e6;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #adb5bd;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <div class="container-fluid">
    <div class="row">

      <!-- SIDEBAR -->
      <aside class="col-md-3 col-lg-2 sidebar p-3">
        <h5 class="text-white mb-4">FKM ENERGY</h5>

        <ul class="nav flex-column gap-1">
          <li class="nav-item">
            <a class="nav-link active" href="#">
              <i class="bi bi-speedometer2"></i> Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">
              <i class="bi bi-box-seam"></i> Inventaire
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">
              <i class="bi bi-arrow-left-right"></i> Transactions
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">
              <i class="bi bi-people"></i> Clients
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">
              <i class="bi bi-truck"></i> Fournisseurs
            </a>
          </li>
          <li class="nav-item mt-2">
            <a class="nav-link" href="#">
              <i class="bi bi-currency-exchange"></i> Taux & Devises
            </a>
          </li>
        </ul>
      </aside>

      <!-- MAIN -->
      <main class="col-md-9 col-lg-10 px-4 py-4">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h2 class="h4 mb-1">Dashboard</h2>
            <div class="text-muted">Pilotage financier du stock</div>
          </div>
          <span class="badge bg-light text-dark border">Vue figée</span>
        </div>

        <!-- KPI -->
        <div class="row g-3 mb-4">
          <div class="col-md-4">
            <div class="card kpi-card shadow-sm">
              <div class="card-body">
                <div class="kpi-label">Valeur du stock (USD)</div>
                <div class="kpi-value">—</div>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card kpi-card shadow-sm">
              <div class="card-body">
                <div class="kpi-label">Valeur du stock (CDF)</div>
                <div class="kpi-value">—</div>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card kpi-card shadow-sm">
              <div class="card-body">
                <div class="kpi-label">Articles en stock</div>
                <div class="kpi-value">—</div>
              </div>
            </div>
          </div>
        </div>

        <!-- CHART -->
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <strong>Historique de la valeur du stock</strong>
              <div class="btn-group btn-group-sm">
                <button class="btn btn-outline-secondary">Mensuel</button>
                <button class="btn btn-outline-secondary">Hebdomadaire</button>
              </div>
            </div>

            <div class="chart-placeholder">
              Graphique basé sur snapshots Firestore
            </div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  ></script>
</body>
</html>
