<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Rapport Financier | FKM ENERGY</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: "#0B5C6B",
        primaryDark: "#083F4A",
        success: "#10B981",
        warning: "#F59E0B",
        danger: "#EF4444",
        bg: "#F3F6FB",
        muted: "#6B7280"
      }
    }
  }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

<style>
  #mainContent { transition: margin-left 0.25s ease; }
</style>

<link rel="icon" href="data:,">
</head>

<body class="bg-bg text-slate-800">

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- MAIN -->
  <main id="mainContent" class="flex-1 px-8 py-8 space-y-8 overflow-x-hidden">

    <!-- HEADER -->
    <div class="bg-white rounded-2xl shadow-md px-8 py-5 flex items-center justify-between border border-slate-100">

      <div class="flex items-center gap-4">
        <button id="toggleSidebar"
          class="p-2 rounded-lg border border-slate-200 hover:bg-slate-100 transition">
          <i class="bi bi-list text-lg"></i>
        </button>

        <div>
          <h1 class="text-xl font-bold">Rapport Financier</h1>
          <p class="text-sm text-muted">Analyse stratégique & performance globale</p>
        </div>
      </div>

      <div class="flex items-center gap-6">
        <div class="text-right">
          <div id="userName" class="font-semibold">—</div>
          <div id="userRole" class="text-sm text-muted">—</div>
        </div>

        <button id="logoutBtn"
          class="px-4 py-2 rounded-lg border border-red-200 text-danger hover:bg-red-50 transition">
          <i class="bi bi-box-arrow-right text-lg"></i>
        </button>
      </div>
    </div>

    <!-- KPI -->
    <div class="grid md:grid-cols-2 xl:grid-cols-4 gap-6">

      <div class="relative bg-gradient-to-br from-primary to-primaryDark text-white rounded-3xl p-8 shadow-xl">
        <p class="text-sm opacity-80">Chiffre d'affaire USD</p>
        <h2 id="caUSD" class="text-4xl font-extrabold">0.00 USD</h2>
      </div>

      <div class="relative bg-gradient-to-br from-emerald-500 to-emerald-700 text-white rounded-3xl p-8 shadow-xl">
        <p class="text-sm opacity-80">Chiffre d'affaire CDF</p>
        <h2 id="caCDF" class="text-4xl font-extrabold">0.00 CDF</h2>
      </div>

      <div class="relative bg-gradient-to-br from-amber-400 to-amber-600 text-white rounded-3xl p-8 shadow-xl">
        <p class="text-sm opacity-80">Valeur Stock USD</p>
        <h2 id="stockUSD" class="text-4xl font-extrabold">0.00 USD</h2>
      </div>

      <div class="relative bg-gradient-to-br from-indigo-500 to-indigo-700 text-white rounded-3xl p-8 shadow-xl">
        <p class="text-sm opacity-80">Valeur Stock CDF</p>
        <h2 id="stockCDF" class="text-4xl font-extrabold">0.00 CDF</h2>
      </div>

    </div>

    <!-- GRAPHIQUES -->
    <div class="grid lg:grid-cols-2 gap-6">

      <div class="bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
        <h3 class="font-semibold text-lg mb-6">Évolution des ventes</h3>
        <div id="salesChart"></div>
      </div>

      <div class="bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
        <h3 class="font-semibold text-lg mb-6">Top produits</h3>
        <div id="productsChart"></div>
      </div>

    </div>

    <!-- VENDEURS -->
    <div class="bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
      <h3 class="font-semibold text-lg mb-6">Top vendeurs</h3>
      <div id="sellersChart"></div>
    </div>

  </main>
</div>

<!-- Sidebar -->
<script type="module" src="../js/sidebar.js"></script>

<!-- Rapport Financier -->
<script type="module" src="../js/rapports-financiers.js"></script>

</body>
</html>
