<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Connexion | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0f766e',   // teal corporate
            secondary: '#0ea5e9',
            surface: '#f8fafc'
          }
        }
      }
    }
  </script>

  <!-- Heroicons -->
  <link rel="stylesheet" href="https://unpkg.com/@heroicons/react@2.1.5/outline/24.css">
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">

  <div class="min-h-screen grid grid-cols-1 lg:grid-cols-2">

    <!-- VISUAL SIDE -->
    <div class="hidden lg:flex relative items-center justify-center overflow-hidden">
      <div class="absolute inset-0 bg-gradient-to-br from-primary/90 to-secondary/80"></div>

      <div class="relative z-10 text-center px-12 text-white">
        <h1 class="text-4xl font-bold tracking-wide mb-4">
          FKM ENERGY
        </h1>
        <p class="text-lg text-white/90 max-w-md mx-auto">
          Plateforme professionnelle de gestion, stockage et logistique énergétique
        </p>

        <div class="mt-12 grid grid-cols-3 gap-6 opacity-90">
          <div class="text-center">
            <div class="text-2xl font-semibold">24/7</div>
            <div class="text-sm">Monitoring</div>
          </div>
          <div class="text-center">
            <div class="text-2xl font-semibold">ISO</div>
            <div class="text-sm">Sécurité</div>
          </div>
          <div class="text-center">
            <div class="text-2xl font-semibold">ERP</div>
            <div class="text-sm">Intégré</div>
          </div>
        </div>
      </div>
    </div>

    <!-- LOGIN PANEL -->
    <div class="flex items-center justify-center bg-surface px-6">
      <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

        <!-- BRAND -->
        <div class="text-center mb-8">
          <div class="text-xl font-bold text-primary tracking-wide">
            FKM ENERGY
          </div>
          <h2 class="mt-2 text-2xl font-semibold text-slate-800">
            Connexion
          </h2>
          <p class="text-sm text-slate-500 mt-1">
            Accès réservé au personnel autorisé
          </p>
        </div>

        <!-- FORM -->
        <form id="loginForm" autocomplete="off" class="space-y-5">

          <!-- USERNAME -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">
              Identifiant
            </label>
            <div class="flex rounded-lg border border-slate-300 focus-within:ring-2 focus-within:ring-primary">
              <input
                type="text"
                id="username"
                required
                placeholder="nom.prenom"
                class="flex-1 px-4 py-2 rounded-l-lg outline-none text-sm"
              />
              <span class="px-3 flex items-center text-sm text-slate-500 bg-slate-100 rounded-r-lg">
                @fkmenergy.com
              </span>
            </div>
          </div>

          <!-- PASSWORD -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">
              Mot de passe
            </label>
            <div class="relative">
              <input
                type="password"
                id="password"
                required
                class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-primary text-sm"
              />
              <button
                type="button"
                id="togglePassword"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary"
              >
                <!-- Eye Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5
                       c4.478 0 8.268 2.943 9.542 7
                       -1.274 4.057-5.064 7-9.542 7
                       -4.477 0-8.268-2.943-9.542-7z" />
                </svg>
              </button>
            </div>
          </div>

          <!-- REMEMBER -->
          <div class="flex items-center">
            <input
              type="checkbox"
              id="rememberMe"
              class="h-4 w-4 text-primary border-slate-300 rounded"
            />
            <label class="ml-2 text-sm text-slate-600">
              Se souvenir de moi
            </label>
          </div>

          <!-- SUBMIT -->
          <button
            type="submit"
            class="w-full bg-primary hover:bg-teal-700 text-white py-2.5 rounded-lg font-medium transition"
          >
            Se connecter
          </button>

          <!-- ERROR -->
          <div
            id="loginError"
            class="text-sm text-red-600 text-center"
          ></div>

        </form>

        <!-- FOOTER -->
        <div class="mt-8 text-center text-xs text-slate-400">
          © FKM ENERGY · Accès contrôlé · Sécurité renforcée
        </div>

      </div>
    </div>

  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
