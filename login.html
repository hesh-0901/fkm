<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <!-- Icons -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <link rel="stylesheet" href="css/login.css">
</head>

<body>

<div class="erp-layout">

  <!-- LEFT (branding discret) -->
  <aside class="erp-left">
    <div class="erp-brand">
      <strong>FKM ENERGY</strong>
      <span>Système de gestion interne</span>
    </div>
  </aside>

  <!-- RIGHT (login) -->
  <main class="erp-right">
    <section class="erp-login">

      <h1>Connexion sécurisée</h1>
      <p>Accès réservé au personnel autorisé</p>

      <form id="loginForm" novalidate>

        <div class="mb-3">
          <label class="form-label">Identifiant</label>
          <input
            type="text"
            id="username"
            class="form-control"
            autocomplete="username"
            required
          >
        </div>

        <div class="mb-3 password-group">
          <label class="form-label">Mot de passe</label>
          <input
            type="password"
            id="password"
            class="form-control"
            autocomplete="current-password"
            required
          >
          <button
            type="button"
            class="password-toggle"
            id="togglePassword"
            tabindex="-1"
            aria-label="Afficher le mot de passe"
          >
            <i class="bi bi-eye"></i>
          </button>
        </div>

        <button type="submit" class="btn btn-primary w-100">
          Se connecter
        </button>

        <div id="loginError" class="erp-error"></div>

      </form>

      <footer class="erp-footer">
        © FKM ENERGY · Accès contrôlé
      </footer>

    </section>
  </main>

</div>

<script type="module" src="js/login.js"></script>
</body>
</html>
