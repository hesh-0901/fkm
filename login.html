<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Connexion sécurisée | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/login.css">
</head>

<body>

<div class="login-wrapper">

  <!-- BACKGROUND -->
  <div class="login-bg"></div>

  <!-- LOGIN PANEL -->
  <div class="login-panel">
    <div class="login-box">

      <h2 class="login-title">Connexion sécurisée</h2>
      <p class="login-subtitle">Accès réservé au personnel autorisé</p>

      <form id="loginForm">

        <!-- USERNAME -->
        <div class="mb-3">
          <label class="form-label">Nom d’utilisateur</label>
          <input
            type="text"
            id="username"
            class="form-control"
            placeholder="Votre identifiant"
            required
          />
        </div>

        <!-- PASSWORD -->
        <div class="mb-4 password-wrapper">
          <label class="form-label">Mot de passe</label>
          <input
            type="password"
            id="password"
            class="form-control"
            required
          />
          <i class="bi bi-eye-slash toggle-password" id="togglePassword"></i>
        </div>

        <button type="submit" class="btn btn-success w-100">
          Se connecter
        </button>

        <div id="loginError" class="login-error mt-3"></div>
      </form>

      <div class="login-footer">
        © FKM ENERGY · Système interne
      </div>

    </div>
  </div>

</div>

<script type="module" src="js/login.js"></script>
</body>
</html>
