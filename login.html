<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Connexion | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0f766e',
            secondary: '#0ea5e9',
            surface: '#f8fafc'
          },
          boxShadow: {
            glow: "0 0 40px rgba(14,165,233,0.35)"
          }
        }
      }
    }
  </script>
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 overflow-hidden">

  <!-- Background Effects -->
  <div class="absolute inset-0">
    <div class="absolute top-[-200px] left-[-200px] w-[500px] h-[500px] bg-primary/30 rounded-full blur-[140px]"></div>
    <div class="absolute bottom-[-200px] right-[-200px] w-[500px] h-[500px] bg-secondary/30 rounded-full blur-[140px]"></div>
  </div>

  <div class="relative min-h-screen grid grid-cols-1 lg:grid-cols-2">

    <!-- VISUAL SIDE -->
    <div class="hidden lg:flex relative items-center justify-center overflow-hidden">

      <div class="relative z-10 text-center px-12 text-white">

        <h1 class="text-5xl font-extrabold tracking-widest mb-6 bg-gradient-to-r from-white to-white/70 bg-clip-text text-transparent">
          FKM ENERGY
        </h1>

        <p class="text-lg text-white/80 max-w-md mx-auto leading-relaxed">
          Plateforme professionnelle de gestion énergétique, contrôle logistique
          et pilotage financier intelligent.
        </p>

        <div class="mt-16 grid grid-cols-3 gap-10 text-white/90">

          <div class="space-y-2">
            <div class="text-3xl font-bold">24/7</div>
            <div class="text-sm uppercase tracking-wide text-white/70">Monitoring</div>
          </div>

          <div class="space-y-2">
            <div class="text-3xl font-bold">ISO</div>
            <div class="text-sm uppercase tracking-wide text-white/70">Sécurité</div>
          </div>

          <div class="space-y-2">
            <div class="text-3xl font-bold">ERP</div>
            <div class="text-sm uppercase tracking-wide text-white/70">Intégré</div>
          </div>

        </div>

      </div>
    </div>

    <!-- LOGIN PANEL -->
    <div class="flex items-center justify-center px-6">

      <div class="w-full max-w-md backdrop-blur-2xl bg-white/80 border border-white/30 rounded-3xl shadow-2xl shadow-black/30 p-10">

        <!-- BRAND -->
        <div class="text-center mb-10">

          <div class="text-2xl font-bold tracking-wider bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">
            FKM ENERGY
          </div>

          <h2 class="mt-3 text-3xl font-semibold text-slate-800">
            Connexion sécurisée
          </h2>

          <p class="text-sm text-slate-500 mt-2">
            Accès réservé au personnel autorisé
          </p>

        </div>

        <!-- FORM -->
        <form id="loginForm" autocomplete="off" class="space-y-6">

          <!-- USERNAME -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">
              Identifiant
            </label>

            <div class="flex rounded-xl border border-slate-300 bg-white/60 focus-within:ring-2 focus-within:ring-primary focus-within:shadow-lg transition">

              <input
                type="text"
                id="username"
                required
                placeholder="nom.prenom"
                class="flex-1 px-4 py-3 rounded-l-xl outline-none text-sm bg-transparent"
              />

              <span class="px-4 flex items-center text-sm text-slate-500 bg-slate-100/60 rounded-r-xl">
                @fkmenergy.com
              </span>

            </div>
          </div>

          <!-- PASSWORD -->
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">
              Mot de passe
            </label>

            <div class="relative">

              <input
                type="password"
                id="password"
                required
                class="w-full px-4 py-3 border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-primary focus:shadow-lg transition text-sm bg-white/60"
              />

              <button
                type="button"
                id="togglePassword"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition"
              >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                  viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5
                       c4.478 0 8.268 2.943 9.542 7
                       -1.274 4.057-5.064 7-9.542 7
                       -4.477 0-8.268-2.943-9.542-7z" />
                </svg>
              </button>

            </div>
          </div>

          <!-- REMEMBER -->
          <div class="flex items-center justify-between">

            <div class="flex items-center">
              <input
                type="checkbox"
                id="rememberMe"
                class="h-4 w-4 text-primary border-slate-300 rounded focus:ring-primary"
              />
              <label class="ml-2 text-sm text-slate-600">
                Se souvenir de moi
              </label>
            </div>

          </div>

          <!-- SUBMIT -->
          <button
            type="submit"
            class="w-full bg-gradient-to-r from-primary to-secondary hover:scale-[1.02] hover:shadow-glow text-white py-3 rounded-xl font-semibold transition-all duration-300"
          >
            Se connecter
          </button>

          <!-- ERROR -->
          <div
            id="loginError"
            class="text-sm text-red-600 text-center font-medium"
          ></div>

        </form>

        <!-- FOOTER -->
        <div class="mt-10 text-center text-xs text-slate-400">
          © FKM ENERGY · Accès contrôlé · Sécurité renforcée
        </div>

      </div>

    </div>

  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
