<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Connexion sécurisée | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <link rel="stylesheet" href="css/login.css">
</head>

<body>

<div class="login-layout">

  <div class="login-visual"></div>

  <div class="login-panel">
    <div class="login-box">

      <h1 class="login-title">Connexion sécurisée</h1>
      <p class="login-subtitle">Accès réservé au personnel autorisé</p>

      <form id="loginForm" novalidate>

        <div class="mb-3">
          <label class="form-label">Nom d’utilisateur</label>
          <input type="text" id="username" class="form-control" required>
        </div>

        <div class="mb-4 password-group">
          <label class="form-label">Mot de passe</label>

          <input
            type="password"
            id="password"
            class="form-control"
            required
          >

          <button
            type="button"
            class="password-toggle"
            id="togglePassword"
            aria-label="Afficher le mot de passe"
          >
            <i class="bi bi-eye"></i>
          </button>
        </div>

        <button type="submit" class="btn btn-success w-100">
          Se connecter
        </button>

        <div id="loginError" class="login-error"></div>
      </form>

      <div class="login-footer">
        © FKM ENERGY · Système interne
      </div>

    </div>
  </div>

</div>

<script type="module" src="js/login.js"></script>
</body>
</html>
