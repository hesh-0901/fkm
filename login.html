<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Connexion | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/login.css">
</head>

<body>

<div class="login-wrapper">

  <!-- LEFT : VISUAL -->
  <div class="login-visual">
    <div class="visual-overlay">
      <h1>FKM ENERGY</h1>
      <p>Gestion intelligente du stock & de la valeur énergétique</p>
    </div>
  </div>

  <!-- RIGHT : LOGIN -->
  <div class="login-panel">
    <div class="login-box">

      <h2>Connexion</h2>
      <p class="text-muted mb-4">Accès au système de gestion</p>

      <form id="loginForm">

        <div class="mb-3">
          <label class="form-label">Adresse email</label>
          <input type="email" id="email" class="form-control" required>
        </div>

        <div class="mb-4">
          <label class="form-label">Mot de passe</label>
          <input type="password" id="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success w-100">
          Se connecter
        </button>

        <div id="loginError" class="login-error mt-3"></div>
      </form>

      <div class="login-footer">
        © FKM ENERGY – Tous droits réservés
      </div>

    </div>
  </div>

</div>

<script type="module" src="js/login.js"></script>
</body>
</html>
