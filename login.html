<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion | FKM ENERGY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="css/login.css">
</head>

<body>

<div class="login-layout">

  <!-- IMAGE SIDE -->
  <div class="login-visual">
    <div class="visual-overlay">
      <h1>FKM ENERGY</h1>
      <p>Système de gestion & logistique énergétique</p>
    </div>
  </div>

  <!-- LOGIN SIDE -->
  <div class="login-panel">

    <div class="login-box">

      <div class="login-brand">FKM ENERGY</div>
      <h2 class="login-title">Connexion</h2>
      <p class="login-subtitle">Accès réservé au personnel autorisé</p>

      <form id="loginForm" autocomplete="off">

        <!-- USERNAME -->
        <div class="mb-3">
          <label class="form-label">Identifiant</label>
          <div class="input-group">
            <input
              type="text"
              id="username"
              class="form-control"
              placeholder="nom.prenom"
              required
            >
            <span class="input-group-text">@fkmenergy.com</span>
          </div>
        </div>

        <!-- PASSWORD -->
        <div class="mb-3 password-group">
          <label class="form-label">Mot de passe</label>
          <input
            type="password"
            id="password"
            class="form-control"
            required
          >
          <button type="button" id="togglePassword" class="password-toggle">
            <i class="bi bi-eye"></i>
          </button>
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="rememberMe">
          <label class="form-check-label">Se souvenir de moi</label>
        </div>

        <button type="submit" class="btn btn-primary w-100">
          Se connecter
        </button>

        <div id="loginError" class="login-error"></div>

      </form>

      <div class="login-footer">
        © FKM ENERGY · Accès contrôlé
      </div>

    </div>
  </div>

</div>

<script type="module" src="js/login.js"></script>
</body>
</html>
